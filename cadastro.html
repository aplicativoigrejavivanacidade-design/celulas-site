<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>+Células | Membros</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, #1d4ed8, #16a34a);
      color: white;
      padding: 24px 18px;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .logo-sub {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 28px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu a {
      text-decoration: none;
      color: white;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
      display: block;
    }

    .menu a:hover,
    .menu a.ativo {
      background: rgba(255,255,255,0.18);
    }

    .content {
      margin-left: 250px;
      flex: 1;
      padding: 30px;
    }

    .header {
      background: white;
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .header p {
      margin: 0;
      color: #4b5563;
    }

    .grid {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .card h2 {
      margin-top: 0;
      font-size: 22px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    input, select, textarea, button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      font-family: inherit;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2563eb;
    }

    button {
      margin-top: 18px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-secondary {
      background: #f59e0b;
      color: white;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
      width: auto;
      padding: 10px 14px;
      margin-top: 0;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .actions button {
      flex: 1;
    }

    .status-msg {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
    }

    .lista-topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .contador {
      background: #eff6ff;
      color: #1d4ed8;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: bold;
      font-size: 13px;
    }

    .membro {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .membro-info h3 {
      margin: 0 0 6px;
      font-size: 18px;
    }

    .membro-info p {
      margin: 4px 0;
      color: #4b5563;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 8px;
    }

    .ativo { background: #dcfce7; color: #166534; }
    .visitante { background: #fef3c7; color: #92400e; }
    .afastado { background: #fee2e2; color: #991b1b; }

    .membro-botoes {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .membro-botoes button {
      width: 100%;
      margin: 0;
    }

    .btn-edit {
      background: #2563eb;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
    }

    .vazio {
      text-align: center;
      color: #6b7280;
      padding: 30px 10px;
      border: 2px dashed #d1d5db;
      border-radius: 16px;
      background: #fcfcfc;
    }

    @media (max-width: 900px) {
      .sidebar {
        position: relative;
        width: 100%;
        bottom: auto;
      }

      .layout {
        flex-direction: column;
      }

      .content {
        margin-left: 0;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .membro {
        flex-direction: column;
      }

      .membro-botoes {
        width: 100%;
      }

      .btn-danger, .btn-edit {
        width: 100%;
      }
    }
  </style>
</head>
<script>
  <script>
  if (localStorage.getItem('logado') !== 'sim') {
    window.location.href = 'login.html';
  }

  const nomeUsuario = localStorage.getItem('nomeUsuario') || 'Administrador';
  const nivelUsuario = localStorage.getItem('nivelUsuario') || 'lider';

  function sair() {
    localStorage.removeItem('logado');
    localStorage.removeItem('usuario');
    localStorage.removeItem('nomeUsuario');
    localStorage.removeItem('nivelUsuario');
    window.location.href = 'login.html';
  }

  const campoUsuario = document.getElementById('usuarioLogado');
  if (campoUsuario) {
    campoUsuario.textContent = `Usuário logado: ${nomeUsuario} • Nível: ${nivelUsuario}`;
  }

  function verificarPermissao(pagina) {
    const permissoes = {
      admin: ['painel', 'membros', 'presenca', 'relatorios', 'usuarios'],
      supervisor: ['painel', 'membros', 'presenca', 'relatorios'],
      lider: ['painel', 'membros', 'presenca']
    };

    const permitidas = permissoes[nivelUsuario] || [];

    if (!permitidas.includes(pagina)) {
      alert('Você não tem permissão para acessar esta área.');
      window.location.href = 'painel.html';
    }
  }

  function aplicarPermissoesMenu() {
    const menuUsuarios = document.getElementById('menuUsuarios');
    const menuRelatorios = document.getElementById('menuRelatorios');

    if (nivelUsuario !== 'admin' && menuUsuarios) {
      menuUsuarios.style.display = 'none';
    }

    if (nivelUsuario === 'lider' && menuRelatorios) {
      menuRelatorios.style.display = 'none';
    }
  }

  aplicarPermissoesMenu();
</script>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">+Células</div>
      <div class="logo-sub">Gestão de células</div>

      <nav class="menu">
        <a href="painel.html">Painel</a>
        <a href="cadastro.html">Membros</a>
        <a href="presenca.html">Presença</a>
        <a href="relatorios.html" id="menuRelatorios">Relatórios</a>
        <a href="usuarios.html" id="menuUsuarios">Usuários</a>
<script>
  verificarPermissao('membros');
</script>
      </nav>
<div style="margin-top: 20px;">
  <button onclick="sair()" style="width:100%;padding:12px;border:none;border-radius:12px;background:#dc2626;color:white;font-weight:bold;cursor:pointer;">
    Sair
  </button>
</div>
    </aside>

    <main class="content">
      <div class="header">
        <h1>Cadastro de membros</h1>
        <p>Cadastre, edite e acompanhe os membros da célula</p>
      </div>

      <div class="grid">
        <div class="card">
          <h2 id="titulo-form">Novo membro</h2>

          <input type="hidden" id="membroId" />

          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Digite o nome do membro" />

          <label for="telefone">Telefone</label>
          <input type="text" id="telefone" placeholder="Digite o telefone" />

          <label for="celula">Célula</label>
          <input type="text" id="celula" placeholder="Ex.: Célula Centro" />

          <label for="nascimento">Data de nascimento</label>
          <input type="date" id="nascimento" />

          <label for="status">Status</label>
          <select id="status">
            <option value="ativo">Ativo</option>
            <option value="visitante">Visitante</option>
            <option value="afastado">Afastado</option>
          </select>

          <label for="observacoes">Observações</label>
          <textarea id="observacoes" placeholder="Anotações importantes"></textarea>

          <div class="actions">
            <button class="btn-primary" onclick="salvarMembro()">Salvar</button>
            <button class="btn-secondary" onclick="limparFormulario()" type="button">Limpar</button>
          </div>

          <div class="status-msg" id="mensagem"></div>
        </div>

        <div class="card">
          <div class="lista-topo">
            <h2 style="margin: 0;">Membros cadastrados</h2>
            <div class="contador" id="contador">0 membros</div>
          </div>

          <div id="lista"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const apiUrl = 'https://celulas-backend.onrender.com:3000/membros';

    async function carregarMembros() {
      const resposta = await fetch(apiUrl);
      const membros = await resposta.json();

      const lista = document.getElementById('lista');
      const contador = document.getElementById('contador');

      contador.textContent = `${membros.length} membro(s)`;

      if (membros.length === 0) {
        lista.innerHTML = '<div class="vazio">Nenhum membro cadastrado ainda.</div>';
        return;
      }

      lista.innerHTML = membros.map((membro) => `
        <div class="membro">
          <div class="membro-info">
            <h3>${membro.nome}</h3>
            <p><strong>Telefone:</strong> ${membro.telefone || '-'}</p>
            <p><strong>Célula:</strong> ${membro.celula || '-'}</p>
            <p><strong>Nascimento:</strong> ${membro.nascimento || '-'}</p>
            <p><strong>Observações:</strong> ${membro.observacoes || '-'}</p>
            <p><strong>ID:</strong> ${membro.id}</p>
            <span class="badge ${membro.status}">${membro.status}</span>
          </div>
          <div class="membro-botoes">
            <button class="btn-edit" onclick="editarMembro(${membro.id})">Editar</button>
            <button class="btn-danger" onclick="excluirMembro(${membro.id})">Excluir</button>
          </div>
        </div>
      `).join('');
    }

    async function salvarMembro() {
      const id = document.getElementById('membroId').value;
      const nome = document.getElementById('nome').value.trim();
      const telefone = document.getElementById('telefone').value.trim();
      const celula = document.getElementById('celula').value.trim();
      const nascimento = document.getElementById('nascimento').value;
      const status = document.getElementById('status').value;
      const observacoes = document.getElementById('observacoes').value.trim();
      const mensagem = document.getElementById('mensagem');

      if (!nome) {
        mensagem.textContent = 'Digite o nome do membro.';
        mensagem.style.color = '#dc2626';
        return;
      }

      const dados = { nome, telefone, celula, nascimento, status, observacoes };

      let resposta;

      if (id) {
        resposta = await fetch(`${apiUrl}/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });
      } else {
        resposta = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados)
        });
      }

      if (resposta.ok) {
        mensagem.textContent = id ? 'Membro atualizado com sucesso.' : 'Membro cadastrado com sucesso.';
        mensagem.style.color = '#16a34a';
        limparFormulario(false);
        carregarMembros();
      } else {
        mensagem.textContent = 'Erro ao salvar membro.';
        mensagem.style.color = '#dc2626';
      }
    }

    async function editarMembro(id) {
      const resposta = await fetch(apiUrl);
      const membros = await resposta.json();
      const membro = membros.find((m) => m.id === id);

      if (!membro) return;

      document.getElementById('membroId').value = membro.id;
      document.getElementById('nome').value = membro.nome || '';
      document.getElementById('telefone').value = membro.telefone || '';
      document.getElementById('celula').value = membro.celula || '';
      document.getElementById('nascimento').value = membro.nascimento || '';
      document.getElementById('status').value = membro.status || 'ativo';
      document.getElementById('observacoes').value = membro.observacoes || '';
      document.getElementById('titulo-form').textContent = 'Editar membro';
      document.getElementById('mensagem').textContent = 'Modo de edição ativado.';
      document.getElementById('mensagem').style.color = '#2563eb';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function excluirMembro(id) {
      const confirmar = confirm('Deseja excluir este membro?');
      if (!confirmar) return;

      const resposta = await fetch(`${apiUrl}/${id}`, {
        method: 'DELETE'
      });

      if (resposta.ok) {
        carregarMembros();
      } else {
        alert('Erro ao excluir membro.');
      }
    }

    function limparFormulario(limparMensagem = true) {
      document.getElementById('membroId').value = '';
      document.getElementById('nome').value = '';
      document.getElementById('telefone').value = '';
      document.getElementById('celula').value = '';
      document.getElementById('nascimento').value = '';
      document.getElementById('status').value = 'ativo';
      document.getElementById('observacoes').value = '';
      document.getElementById('titulo-form').textContent = 'Novo membro';

      if (limparMensagem) {
        document.getElementById('mensagem').textContent = '';
      }
    }

    carregarMembros();
  </script>
</body>
<script>
  if (localStorage.getItem('logado') !== 'sim') {
    window.location.href = 'login.html';
  }

  function sair() {
    localStorage.removeItem('logado');
    localStorage.removeItem('usuario');
    window.location.href = 'login.html';
  }
</script>
</html>
