<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>+Células | Membros</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #eef2f7;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ee;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --green: #16a34a;
      --green-dark: #15803d;
      --amber: #f59e0b;
      --red: #dc2626;
      --gray: #64748b;
      --gray-dark: #475569;
      --shadow: 0 10px 25px rgba(0,0,0,0.05);
      --radius: 16px;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, var(--blue-dark), var(--green));
      color: white;
      padding: 24px 18px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
    }

    .logo {
      font-size: 30px;
      font-weight: bold;
      margin: 0;
    }

    .logo-sub {
      margin: 6px 0 28px;
      font-size: 13px;
      opacity: 0.9;
    }

    .menu a {
      display: block;
      color: white;
      padding: 12px;
      text-decoration: none;
      border-radius: 10px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .menu a:hover,
    .menu a.ativo {
      background: rgba(255,255,255,0.16);
    }

    .btn-sair {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: var(--red);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .content {
      margin-left: 250px;
      padding: 30px;
      width: calc(100% - 250px);
    }

    .header {
      background: var(--card);
      padding: 22px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .header p {
      margin: 0;
      color: var(--muted);
    }

    .usuario-logado {
      margin-top: 10px !important;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1.15fr;
      gap: 20px;
      align-items: start;
    }

    .card {
      background: var(--card);
      padding: 22px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 22px;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font-size: 15px;
      font-family: inherit;
      background: #fff;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    input[type="text"] {
      text-transform: uppercase;
    }

    input[readonly] {
      background: #f8fafc;
      color: #475569;
      cursor: not-allowed;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .acoes {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-primary {
      background: var(--blue);
      color: white;
    }

    .btn-primary:hover {
      background: var(--blue-dark);
    }

    .btn-success {
      background: var(--green);
      color: white;
    }

    .btn-success:hover {
      background: var(--green-dark);
    }

    .btn-danger {
      background: var(--red);
      color: white;
    }

    .btn-secondary {
      background: var(--gray);
      color: white;
    }

    .btn-secondary:hover {
      background: var(--gray-dark);
    }

    .status-edicao {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: bold;
      background: #eff6ff;
      color: #1d4ed8;
    }

    .msg {
      margin-top: 14px;
      font-weight: bold;
      min-height: 20px;
      font-size: 14px;
    }

    .filtros {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .membro-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      background: #fafbfd;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .membro-item:hover,
    .membro-item.ativo {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.10);
    }

    .membro-item h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .membro-item p {
      margin: 0 0 4px;
      font-size: 13px;
      color: #4b5563;
    }

    .vazio {
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 20px;
      border: 2px dashed var(--line);
      border-radius: 12px;
      background: #fcfdff;
    }

    @media (max-width: 1150px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }

      .content {
        margin-left: 0;
        width: 100%;
        padding: 20px;
      }

      .grid-2,
      .filtros {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h2 class="logo">+Células</h2>
      <div class="logo-sub">Cadastro de membros</div>

      <div class="menu">
        <a href="painel.html">Painel</a>
        <a href="cadastro.html" class="ativo">Membros</a>
        <a href="presenca.html">Presença</a>
        <a href="celulas.html">Células</a>
        <a href="relatorios.html">Relatórios</a>
        <a href="usuarios.html">Usuários</a>
      </div>

      <button class="btn-sair" id="btnSair" type="button">Sair</button>
    </aside>

    <main class="content">
      <div class="header">
        <h1>Cadastro de membros</h1>
        <p>O campo célula é apenas consulta e deve ser gerenciado somente pela tela de Células</p>
        <p id="usuarioLogado" class="usuario-logado"></p>
      </div>

      <div class="grid">
        <div class="card">
          <h2>Membros cadastrados</h2>

          <div class="filtros">
            <div>
              <label for="filtroNome">Pesquisar por nome</label>
              <input id="filtroNome" type="text" placeholder="Digite o nome" />
            </div>

            <div>
              <label for="filtroStatus">Filtrar por status</label>
              <select id="filtroStatus">
                <option value="">Todos</option>
                <option value="ATIVO">ATIVO</option>
                <option value="VISITANTE">VISITANTE</option>
                <option value="AFASTADO">AFASTADO</option>
              </select>
            </div>

            <div>
              <label for="filtroCelula">Filtrar por célula</label>
              <select id="filtroCelula">
                <option value="">Todas</option>
              </select>
            </div>
          </div>

          <div id="listaMembros"></div>
        </div>

        <div class="card">
          <h2>Dados do membro</h2>

          <input id="membroId" type="hidden" />

          <div class="status-edicao" id="statusEdicao">
            Modo atual: VISUALIZAÇÃO. Selecione um membro e clique em Editar membro.
          </div>

          <label for="nome">Nome completo</label>
          <input id="nome" type="text" placeholder="Nome completo" readonly />

          <div class="grid-2">
            <div>
              <label for="telefone">Telefone</label>
              <input id="telefone" type="text" placeholder="Telefone" readonly />
            </div>

            <div>
              <label for="nascimento">Data de nascimento</label>
              <input id="nascimento" type="date" max="9999-12-31" readonly />
            </div>
          </div>

          <div class="grid-2">
            <div>
              <label for="status">Status</label>
              <select id="status" disabled>
                <option value="">Selecione</option>
                <option value="ATIVO">ATIVO</option>
                <option value="VISITANTE">VISITANTE</option>
                <option value="AFASTADO">AFASTADO</option>
              </select>
            </div>

            <div>
              <label for="celula">Célula</label>
              <input id="celula" type="text" readonly />
            </div>
          </div>

          <label for="cep">CEP</label>
          <input id="cep" type="text" placeholder="00000-000" readonly />

          <label for="rua">Rua</label>
          <input id="rua" type="text" placeholder="Rua" readonly />

          <div class="grid-2">
            <div>
              <label for="numero">Número</label>
              <input id="numero" type="text" placeholder="Número" readonly />
            </div>

            <div>
              <label for="complemento">Complemento</label>
              <input id="complemento" type="text" placeholder="Complemento" readonly />
            </div>
          </div>

          <div class="grid-2">
            <div>
              <label for="bairro">Bairro</label>
              <input id="bairro" type="text" placeholder="Bairro" readonly />
            </div>

            <div>
              <label for="cidade">Cidade</label>
              <input id="cidade" type="text" placeholder="Cidade" readonly />
            </div>
          </div>

          <div class="grid-2">
            <div>
              <label for="estado">Estado</label>
              <input id="estado" type="text" placeholder="UF" readonly />
            </div>

            <div>
              <label for="observacoes">Observações</label>
              <input id="observacoes" type="text" placeholder="Observações" readonly />
            </div>
          </div>

          <div class="acoes">
            <button class="btn-primary" id="btnEditar" type="button">Editar membro</button>
            <button class="btn-success" id="btnSalvar" type="button">Salvar membro</button>
            <button class="btn-secondary" id="btnCancelar" type="button">Cancelar edição</button>
            <button class="btn-secondary" id="btnNovo" type="button">Novo cadastro</button>
            <button class="btn-danger" id="btnExcluir" type="button">Excluir membro</button>
          </div>

          <div id="msg" class="msg"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = "https://celulas-backend.onrender.com";
    const API_MEMBROS = API_BASE + "/membros";

    let membros = [];
    let membroSelecionadoId = "";
    let modoEdicao = false;
    let membroAtual = null;

    const campoId = document.getElementById("membroId");
    const campoNome = document.getElementById("nome");
    const campoTelefone = document.getElementById("telefone");
    const campoNascimento = document.getElementById("nascimento");
    const campoStatus = document.getElementById("status");
    const campoCelula = document.getElementById("celula");
    const campoCep = document.getElementById("cep");
    const campoRua = document.getElementById("rua");
    const campoNumero = document.getElementById("numero");
    const campoComplemento = document.getElementById("complemento");
    const campoBairro = document.getElementById("bairro");
    const campoCidade = document.getElementById("cidade");
    const campoEstado = document.getElementById("estado");
    const campoObservacoes = document.getElementById("observacoes");
    const campoLista = document.getElementById("listaMembros");
    const campoMsg = document.getElementById("msg");
    const campoUsuario = document.getElementById("usuarioLogado");
    const campoStatusEdicao = document.getElementById("statusEdicao");
    const campoFiltroNome = document.getElementById("filtroNome");
    const campoFiltroStatus = document.getElementById("filtroStatus");
    const campoFiltroCelula = document.getElementById("filtroCelula");

    function protegerPagina() {
      if (localStorage.getItem("logado") !== "sim") {
        window.location.href = "login.html";
        return false;
      }
      return true;
    }

    function preencherUsuario() {
      campoUsuario.textContent =
        `Usuário: ${localStorage.getItem("nomeUsuario") || "Administrador"} | Nível: ${localStorage.getItem("nivelUsuario") || "admin"}`;
    }

    function sair() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    function mostrarMensagem(texto, cor = "#dc2626") {
      campoMsg.textContent = texto;
      campoMsg.style.color = cor;
    }

    function normalizarTexto(valor) {
      return String(valor || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toUpperCase();
    }

    function formatarCep(valor) {
      const numeros = String(valor || "").replace(/\D/g, "").slice(0, 8);
      if (numeros.length > 5) return `${numeros.slice(0, 5)}-${numeros.slice(5)}`;
      return numeros;
    }

    function setCamposEditaveis(liberado) {
      modoEdicao = liberado;

      campoNome.readOnly = !liberado;
      campoTelefone.readOnly = !liberado;
      campoNascimento.readOnly = !liberado;
      campoCep.readOnly = !liberado;
      campoRua.readOnly = !liberado;
      campoNumero.readOnly = !liberado;
      campoComplemento.readOnly = !liberado;
      campoBairro.readOnly = !liberado;
      campoCidade.readOnly = !liberado;
      campoEstado.readOnly = !liberado;
      campoObservacoes.readOnly = !liberado;
      campoStatus.disabled = !liberado;

      if (modoEdicao) {
        campoStatusEdicao.textContent = "Modo atual: EDIÇÃO LIBERADA. Revise os dados e clique em Salvar membro.";
        campoStatusEdicao.style.background = "#ecfdf5";
        campoStatusEdicao.style.color = "#166534";
      } else {
        campoStatusEdicao.textContent = "Modo atual: VISUALIZAÇÃO. Selecione um membro e clique em Editar membro.";
        campoStatusEdicao.style.background = "#eff6ff";
        campoStatusEdicao.style.color = "#1d4ed8";
      }
    }

    function ordenarMembros(lista) {
      return [...lista].sort((a, b) =>
        String(a.nome || "").localeCompare(String(b.nome || ""), "pt-BR")
      );
    }

    function preencherFiltroCelula() {
      const mapa = new Map();

      membros.forEach((membro) => {
        const celula = String(membro.celula || "").trim();
        if (!celula) return;
        const chave = normalizarTexto(celula);
        if (!mapa.has(chave)) mapa.set(chave, celula);
      });

      const atuais = Array.from(mapa.values()).sort((a, b) =>
        String(a).localeCompare(String(b), "pt-BR")
      );

      const valorAtual = campoFiltroCelula.value;

      campoFiltroCelula.innerHTML =
        '<option value="">Todas</option>' +
        atuais.map((celula) => `<option value="${celula}">${celula}</option>`).join("");

      if (atuais.includes(valorAtual)) {
        campoFiltroCelula.value = valorAtual;
      }
    }

    function membrosFiltrados() {
      const nome = normalizarTexto(campoFiltroNome.value);
      const status = normalizarTexto(campoFiltroStatus.value);
      const celula = normalizarTexto(campoFiltroCelula.value);

      return ordenarMembros(membros).filter((membro) => {
        const nomeOk = !nome || normalizarTexto(membro.nome).includes(nome);
        const statusOk = !status || normalizarTexto(membro.status) === status;
        const celulaOk = !celula || normalizarTexto(membro.celula) === celula;
        return nomeOk && statusOk && celulaOk;
      });
    }

    function limparFormulario() {
      campoId.value = "";
      campoNome.value = "";
      campoTelefone.value = "";
      campoNascimento.value = "";
      campoStatus.value = "";
      campoCelula.value = "";
      campoCep.value = "";
      campoRua.value = "";
      campoNumero.value = "";
      campoComplemento.value = "";
      campoBairro.value = "";
      campoCidade.value = "";
      campoEstado.value = "";
      campoObservacoes.value = "";
      membroSelecionadoId = "";
      membroAtual = null;
      setCamposEditaveis(false);
      mostrarMensagem("", "#dc2626");
      renderLista();
    }

    function preencherFormulario(membro) {
      campoId.value = membro.id || "";
      campoNome.value = membro.nome || "";
      campoTelefone.value = membro.telefone || "";
      campoNascimento.value = String(membro.nascimento || "").slice(0, 10);
      campoStatus.value = membro.status || "";
      campoCelula.value = membro.celula || "";
      campoCep.value = membro.cep || "";
      campoRua.value = membro.rua || "";
      campoNumero.value = membro.numero || "";
      campoComplemento.value = membro.complemento || "";
      campoBairro.value = membro.bairro || "";
      campoCidade.value = membro.cidade || "";
      campoEstado.value = membro.estado || "";
      campoObservacoes.value = membro.observacoes || "";
      membroSelecionadoId = String(membro.id || "");
      membroAtual = { ...membro };
      setCamposEditaveis(false);
      renderLista();
    }

    function renderLista() {
      const lista = membrosFiltrados();

      if (!lista.length) {
        campoLista.innerHTML = '<div class="vazio">Nenhum membro encontrado.</div>';
        return;
      }

      campoLista.innerHTML = lista.map((membro) => `
        <div class="membro-item ${String(membro.id) === membroSelecionadoId ? "ativo" : ""}" data-id="${membro.id}">
          <h3>${membro.nome || ""}</h3>
          <p><strong>Telefone:</strong> ${membro.telefone || "-"}</p>
          <p><strong>Status:</strong> ${membro.status || "-"}</p>
          <p><strong>Célula:</strong> ${membro.celula || "SEM CÉLULA"}</p>
        </div>
      `).join("");
    }

    async function buscarCep() {
      const cep = String(campoCep.value || "").replace(/\D/g, "");
      if (cep.length !== 8) return;

      try {
        const resposta = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const dados = await resposta.json();

        if (dados.erro) return;

        campoRua.value = (dados.logradouro || "").toUpperCase();
        campoBairro.value = (dados.bairro || "").toUpperCase();
        campoCidade.value = (dados.localidade || "").toUpperCase();
        campoEstado.value = (dados.uf || "").toUpperCase();
      } catch (erro) {
        console.error("Erro ao buscar CEP:", erro);
      }
    }

    function corrigirNascimento() {
      const valor = String(campoNascimento.value || "");
      if (!valor) return;
      const partes = valor.split("-");
      if (partes.length !== 3) return;
      partes[0] = partes[0].slice(0, 4);
      campoNascimento.value = `${partes[0]}-${partes[1]}-${partes[2]}`;
    }

    function payloadMembro() {
      corrigirNascimento();

      return {
        nome: campoNome.value.trim(),
        telefone: campoTelefone.value.trim(),
        nascimento: campoNascimento.value,
        status: campoStatus.value,
        cep: campoCep.value.trim(),
        rua: campoRua.value.trim(),
        numero: campoNumero.value.trim(),
        complemento: campoComplemento.value.trim(),
        bairro: campoBairro.value.trim(),
        cidade: campoCidade.value.trim(),
        estado: campoEstado.value.trim(),
        observacoes: campoObservacoes.value.trim()
      };
    }

    async function carregarMembros() {
      try {
        const resposta = await fetch(API_MEMBROS, { cache: "no-store" });
        if (!resposta.ok) throw new Error("Erro ao carregar membros.");

        membros = await resposta.json();
        preencherFiltroCelula();
        renderLista();
      } catch (erro) {
        console.error(erro);
        mostrarMensagem("Erro ao carregar membros.");
      }
    }

    async function salvarNovoMembro() {
      try {
        const resposta = await fetch(API_MEMBROS, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payloadMembro())
        });

        const dados = await resposta.json().catch(() => ({}));
        if (!resposta.ok) throw new Error(dados.erro || "Erro ao salvar membro.");

        mostrarMensagem("Membro salvo com sucesso.", "#16a34a");
        limparFormulario();
        await carregarMembros();
      } catch (erro) {
        console.error(erro);
        mostrarMensagem(erro.message || "Erro ao salvar membro.");
      }
    }

    async function atualizarMembro() {
      const id = campoId.value.trim();
      if (!id) {
        mostrarMensagem("Selecione um membro para atualizar.");
        return;
      }

      try {
        const resposta = await fetch(`${API_MEMBROS}/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payloadMembro())
        });

        const dados = await resposta.json().catch(() => ({}));
        if (!resposta.ok) throw new Error(dados.erro || "Erro ao atualizar membro.");

        mostrarMensagem("Membro atualizado com sucesso.", "#16a34a");
        await carregarMembros();

        const atualizado = membros.find((m) => String(m.id) === String(id));
        if (atualizado) preencherFormulario(atualizado);
      } catch (erro) {
        console.error(erro);
        mostrarMensagem(erro.message || "Erro ao atualizar membro.");
      }
    }

    async function excluirMembro() {
      const id = campoId.value.trim();
      if (!id) {
        mostrarMensagem("Selecione um membro para excluir.");
        return;
      }

      try {
        const resposta = await fetch(`${API_MEMBROS}/${id}`, {
          method: "DELETE"
        });

        const dados = await resposta.json().catch(() => ({}));
        if (!resposta.ok) throw new Error(dados.erro || "Erro ao excluir membro.");

        mostrarMensagem("Membro excluído com sucesso.", "#16a34a");
        limparFormulario();
        await carregarMembros();
      } catch (erro) {
        console.error(erro);
        mostrarMensagem(erro.message || "Erro ao excluir membro.");
      }
    }

    document.getElementById("btnSair").addEventListener("click", sair);

    document.getElementById("btnEditar").addEventListener("click", () => {
      if (!campoId.value) {
        mostrarMensagem("Selecione um membro antes de editar.");
        return;
      }

      setCamposEditaveis(true);
      mostrarMensagem("Edição liberada. Revise os dados e clique em Salvar membro.", "#2563eb");
    });

    document.getElementById("btnSalvar").addEventListener("click", () => {
      if (campoId.value) {
        atualizarMembro();
      } else {
        salvarNovoMembro();
      }
    });

    document.getElementById("btnCancelar").addEventListener("click", () => {
      if (membroAtual) {
        preencherFormulario(membroAtual);
        mostrarMensagem("Edição cancelada. Dados atuais restaurados.", "#64748b");
      } else {
        limparFormulario();
        mostrarMensagem("Edição cancelada.", "#64748b");
      }
    });

    document.getElementById("btnNovo").addEventListener("click", () => {
      limparFormulario();
      setCamposEditaveis(true);
      mostrarMensagem("Modo novo cadastro liberado. Preencha os dados e salve.", "#2563eb");
    });

    document.getElementById("btnExcluir").addEventListener("click", excluirMembro);

    campoCep.addEventListener("input", () => {
      campoCep.value = formatarCep(campoCep.value);
    });

    campoCep.addEventListener("blur", () => {
      if (modoEdicao) buscarCep();
    });

    campoNascimento.addEventListener("change", corrigirNascimento);
    campoNascimento.addEventListener("blur", corrigirNascimento);

    campoFiltroNome.addEventListener("input", renderLista);
    campoFiltroStatus.addEventListener("change", renderLista);
    campoFiltroCelula.addEventListener("change", renderLista);

    campoLista.addEventListener("click", (evento) => {
      const item = evento.target.closest(".membro-item");
      if (!item) return;

      const id = item.dataset.id;
      const membro = membros.find((m) => String(m.id) === String(id));
      if (membro) preencherFormulario(membro);
    });

    if (protegerPagina()) {
      preencherUsuario();
      setCamposEditaveis(false);
      carregarMembros();
    }
  </script>
</body>
</html>
