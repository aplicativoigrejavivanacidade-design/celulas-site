<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>+Células | Membros</title>

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#eef2f7;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe3ee;
      --blue:#2563eb;
      --blue-dark:#1d4ed8;
      --green:#16a34a;
      --amber:#f59e0b;
      --red:#dc2626;
      --shadow:0 10px 25px rgba(0,0,0,0.05);
      --radius:16px;
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .layout{display:flex;min-height:100vh;}

    .sidebar{
      width:250px;
      background:linear-gradient(180deg,var(--blue-dark),var(--green));
      color:#fff;
      padding:24px 18px;
      position:fixed;
      top:0;
      left:0;
      height:100%;
    }

    .logo{font-size:30px;font-weight:bold;margin:0;}
    .logo-sub{margin:6px 0 28px;font-size:13px;opacity:.9;}

    .menu a{
      display:block;
      color:#fff;
      padding:12px;
      text-decoration:none;
      border-radius:10px;
      margin-bottom:6px;
      font-weight:bold;
    }

    .menu a:hover,.menu a.ativo{
      background:rgba(255,255,255,.16);
    }

    .btn-sair{
      margin-top:20px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:12px;
      background:var(--red);
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    .content{
      margin-left:250px;
      padding:30px;
      width:calc(100% - 250px);
    }

    .header,.card{
      background:var(--card);
      padding:22px;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .header{margin-bottom:20px;}
    .header h1{margin:0 0 8px;font-size:30px;}
    .header p{margin:0;color:var(--muted);}

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    label{
      display:block;
      margin-top:12px;
      margin-bottom:6px;
      font-weight:bold;
    }

    input,textarea,select{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--line);
    }

    .acoes{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    button{
      padding:12px 14px;
      border-radius:10px;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }

    .btn-primario{background:var(--blue);color:#fff;}
    .btn-aviso{background:var(--amber);color:#fff;}
    .btn-perigo{background:var(--red);color:#fff;}

    .item{
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px;
      margin-bottom:10px;
      background:#fafbfd;
    }

    .badge{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:bold;
      background:#e8f0ff;
      color:var(--blue-dark);
    }

    .msg{
      margin-top:14px;
      font-weight:bold;
      min-height:20px;
    }

    .vazio{
      color:var(--muted);
      text-align:center;
      padding:20px;
      border:2px dashed var(--line);
      border-radius:12px;
      background:#fcfdff;
    }

    @media(max-width:900px){
      .layout{flex-direction:column;}
      .sidebar{position:relative;width:100%;height:auto;}
      .content{margin-left:0;width:100%;padding:20px;}
      .grid-2{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h2 class="logo">+Células</h2>
    <div class="logo-sub">Gestão de células</div>

    <div class="menu">
      <a href="painel.html">Painel</a>
      <a href="cadastro.html" class="ativo">Membros</a>
      <a href="presenca.html">Presença</a>
      <a href="celulas.html">Células</a>
      <a href="relatorios.html">Relatórios</a>
      <a href="usuarios.html">Usuários</a>
    </div>

    <button class="btn-sair" id="btnSair">Sair</button>
  </aside>

  <main class="content">
    <div class="header">
      <h1>Membros</h1>
      <p>Cadastre e edite membros</p>
      <p id="usuarioLogado"></p>
    </div>

    <div class="grid-2">
      <div class="card">
        <input id="membroId" type="hidden">

        <label>Nome</label>
        <input id="nome" type="text">

        <div class="grid-2">
          <div>
            <label>Telefone</label>
            <input id="telefone" type="text">
          </div>
          <div>
            <label>Célula</label>
            <input id="celula" type="text">
          </div>
        </div>

        <div class="grid-2">
          <div>
            <label>Nascimento</label>
            <input id="nascimento" type="date">
          </div>
          <div>
            <label>Status</label>
            <select id="status">
              <option value="ATIVO">ATIVO</option>
              <option value="INATIVO">INATIVO</option>
            </select>
          </div>
        </div>

        <label>CEP</label>
        <input id="cep" type="text">

        <label>Rua</label>
        <input id="rua" type="text">

        <div class="grid-2">
          <div>
            <label>Número</label>
            <input id="numero" type="text">
          </div>
          <div>
            <label>Complemento</label>
            <input id="complemento" type="text">
          </div>
        </div>

        <div class="grid-2">
          <div>
            <label>Bairro</label>
            <input id="bairro" type="text">
          </div>
          <div>
            <label>Cidade</label>
            <input id="cidade" type="text">
          </div>
        </div>

        <label>Estado</label>
        <input id="estado" type="text">

        <label>Observações</label>
        <textarea id="observacoes" rows="4"></textarea>

        <div class="acoes">
          <button id="btnSalvar" class="btn-primario">Salvar membro</button>
          <button id="btnNovo" class="btn-aviso">Novo</button>
        </div>

        <div id="msg" class="msg"></div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <h2 style="margin:0;">Lista de membros</h2>
          <span class="badge" id="contador">0 membro(s)</span>
        </div>

        <div id="listaMembros"></div>
      </div>
    </div>
  </main>
</div>

<script>
const API = "https://celulas-backend.onrender.com";
let membros = [];

if(localStorage.getItem("logado") !== "sim"){
  window.location.href = "login.html";
}

document.getElementById("usuarioLogado").textContent =
  `Usuário: ${localStorage.getItem("nomeUsuario") || "Administrador"}`;

document.getElementById("btnSair").onclick = function(){
  localStorage.clear();
  window.location.href = "login.html";
};

function v(id){ return document.getElementById(id).value; }
function setv(id,val){ document.getElementById(id).value = val || ""; }

function limpar(){
  [
    "membroId","nome","telefone","celula","nascimento",
    "cep","rua","numero","complemento","bairro",
    "cidade","estado","observacoes"
  ].forEach(id => setv(id,""));

  setv("status","ATIVO");
  document.getElementById("btnSalvar").textContent = "Salvar membro";
}

async function buscarCep(){
  const cep = v("cep").replace(/\D/g,"");
  if(cep.length !== 8) return;

  try{
    const resp = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
    const d = await resp.json();

    if(d.erro) return;

    setv("rua", d.logradouro);
    setv("bairro", d.bairro);
    setv("cidade", d.localidade);
    setv("estado", d.uf);

  }catch{}
}

async function carregarMembros(){
  const lista = document.getElementById("listaMembros");

  try{
    const resp = await fetch(API + "/membros",{cache:"no-store"});
    membros = await resp.json();

    document.getElementById("contador").textContent =
      `${membros.length} membro(s)`;

    if(!membros.length){
      lista.innerHTML = '<div class="vazio">Nenhum membro cadastrado.</div>';
      return;
    }

    lista.innerHTML = membros.map(m => `
      <div class="item">
        <h3>${m.nome}</h3>
        <p><strong>Célula:</strong> ${m.celula || "-"}</p>
        <p><strong>Status:</strong> ${m.status || "-"}</p>

        <div class="acoes">
          <button class="btn-primario" onclick="editar(${m.id})">Editar</button>
          <button class="btn-perigo" onclick="excluir(${m.id})">Excluir</button>
        </div>
      </div>
    `).join("");

  }catch{
    lista.innerHTML = '<div class="vazio">Erro ao carregar membros.</div>';
  }
}

window.editar = function(id){
  const m = membros.find(x => Number(x.id) === Number(id));
  if(!m) return;

  Object.keys(m).forEach(k => {
    const el = document.getElementById(k);
    if(el) el.value = m[k] || "";
  });

  setv("membroId",m.id);
  document.getElementById("btnSalvar").textContent = "Atualizar membro";
  window.scrollTo({top:0,behavior:"smooth"});
};

window.excluir = async function(id){
  if(!confirm("Excluir membro?")) return;

  await fetch(API + "/membros/" + id,{method:"DELETE"});
  carregarMembros();
};

document.getElementById("cep").addEventListener("blur", buscarCep);
document.getElementById("btnNovo").onclick = limpar;

document.getElementById("btnSalvar").onclick = async function(){
  const msg = document.getElementById("msg");
  const id = v("membroId");

  const dados = {
    nome:v("nome"),
    telefone:v("telefone"),
    celula:v("celula"),
    nascimento:v("nascimento"),
    status:v("status"),
    cep:v("cep"),
    rua:v("rua"),
    numero:v("numero"),
    complemento:v("complemento"),
    bairro:v("bairro"),
    cidade:v("cidade"),
    estado:v("estado"),
    observacoes:v("observacoes")
  };

  if(!dados.nome){
    msg.textContent = "Informe o nome.";
    msg.style.color = "#dc2626";
    return;
  }

  try{
    const resp = await fetch(API + (id ? "/membros/" + id : "/membros"),{
      method:id ? "PUT" : "POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(dados)
    });

    if(!resp.ok) throw new Error();

    msg.textContent = id
      ? "Membro atualizado com sucesso!"
      : "Membro salvo com sucesso!";

    msg.style.color = "#16a34a";

    limpar();
    carregarMembros();

  }catch{
    msg.textContent = "Erro ao salvar membro.";
    msg.style.color = "#dc2626";
  }
};

carregarMembros();
</script>
</body>
</html>
