<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>+Células | Membros</title><style>
* { box-sizing: border-box; }
:root{
  --bg:#eef2f7; --card:#ffffff; --text:#1f2937; --muted:#6b7280; --line:#dbe3ee;
  --blue:#2563eb; --blue-dark:#1d4ed8; --green:#16a34a; --amber:#f59e0b; --red:#dc2626;
  --shadow:0 10px 25px rgba(0,0,0,0.05); --radius:16px;
}
body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
.layout { display: flex; min-height: 100vh; }
.sidebar { width: 250px; background: linear-gradient(180deg, var(--blue-dark), var(--green)); color: white; padding: 24px 18px; position: fixed; top: 0; left: 0; height: 100%; }
.logo { font-size: 30px; font-weight: bold; margin: 0; }
.logo-sub { margin: 6px 0 28px; font-size: 13px; opacity: 0.9; }
.menu a { display: block; color: white; padding: 12px; text-decoration: none; border-radius: 10px; margin-bottom: 6px; font-weight: bold; }
.menu a:hover, .menu a.ativo { background: rgba(255,255,255,0.16); }
.btn-sair { margin-top: 20px; width: 100%; padding: 12px; border: none; border-radius: 12px; background: var(--red); color: white; font-weight: bold; cursor: pointer; }
.content { margin-left: 250px; padding: 30px; width: calc(100% - 250px); }
.header { background: var(--card); padding: 22px; border-radius: var(--radius); margin-bottom: 20px; box-shadow: var(--shadow); }
.header h1 { margin: 0 0 8px; font-size: 30px; }
.header p { margin: 0; color: var(--muted); }
.header .usuario-logado { margin-top: 10px; font-size: 14px; }
.card { background: var(--card); padding: 22px; border-radius: var(--radius); box-shadow: var(--shadow); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
label { display: block; margin-top: 12px; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
input, textarea, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--line); font-size: 15px; font-family: inherit; background: #fff; }
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
input[type="text"], textarea { text-transform: uppercase; }
button { padding: 12px 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
.btn-primario { background: var(--blue); color: white; }
.btn-sucesso { background: var(--green); color: white; }
.btn-aviso { background: var(--amber); color: white; }
.btn-perigo { background: var(--red); color: white; }
.acoes { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
.badge { display:inline-block; padding:8px 12px; border-radius:999px; font-size:13px; font-weight:bold; background:#e8f0ff; color:var(--blue-dark); }
.item { border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 10px; background: #fafbfd; }
.item h3 { margin: 0 0 6px; font-size: 17px; }
.item p { margin: 0 0 4px; color: #4b5563; font-size: 13px; }
.msg { margin-top: 14px; font-weight: bold; min-height: 20px; font-size: 14px; }
.vazio { color: var(--muted); font-style: italic; text-align: center; padding: 20px; border: 2px dashed var(--line); border-radius: 12px; background: #fcfdff; }
@media (max-width: 1100px) { .grid-3, .grid-4 { grid-template-columns: 1fr; } }
@media (max-width: 900px) { .layout { flex-direction: column; } .sidebar { position: relative; width: 100%; height: auto; } .content { margin-left: 0; width: 100%; padding: 20px; } .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; } }
</style></head><body><div class="layout"><aside class="sidebar"><h2 class="logo">+Células</h2><div class="logo-sub">Gestão de células</div><div class="menu"><a href="painel.html" class="">Painel</a><a href="cadastro.html" class="ativo">Membros</a><a href="presenca.html" class="">Presença</a><a href="celulas.html" class="">Células</a><a href="relatorios.html" class="">Relatórios</a><a href="usuarios.html" class="">Usuários</a></div><button class="btn-sair" id="btnSair" type="button">Sair</button></aside><main class="content"><div class="header"><h1>Novo membro</h1><p>Cadastre e edite membros</p><p class="usuario-logado" id="usuarioLogado"></p></div><div class="grid-2"><div class="card"><input id="membroId" type="hidden"><label>Nome</label><input id="nome" type="text" placeholder="Nome completo"><div class="grid-2"><div><label>Telefone</label><input id="telefone" type="text" placeholder="(00) 00000-0000"></div><div><label>Célula</label><input id="celula" type="text" placeholder="Nome da célula"></div></div><div class="grid-2"><div><label>Nascimento</label><input id="nascimento" type="date"></div><div><label>Status</label><select id="status"><option value="ATIVO">Ativo</option><option value="INATIVO">Inativo</option></select></div></div><label>CEP</label><input id="cep" type="text" placeholder="00000-000"><label>Rua</label><input id="rua" type="text" placeholder="Rua"><div class="grid-2"><div><label>Número</label><input id="numero" type="text" placeholder="Número"></div><div><label>Complemento</label><input id="complemento" type="text" placeholder="Complemento"></div></div><div class="grid-2"><div><label>Bairro</label><input id="bairro" type="text" placeholder="Bairro"></div><div><label>Cidade</label><input id="cidade" type="text" placeholder="Cidade"></div></div><label>Estado</label><input id="estado" type="text" placeholder="UF"><label>Observações</label><textarea id="observacoes" rows="4" placeholder="Anotações importantes"></textarea><div class="acoes"><button id="btnSalvar" class="btn-primario" type="button">Salvar membro</button><button id="btnNovo" class="btn-aviso" type="button">Novo</button></div><div id="msg" class="msg"></div></div><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px"><h2 style="margin:0">Lista de membros</h2><span class="badge" id="contador">0 membro(s)</span></div><div id="listaMembros"></div></div></div></main></div><script>
const API_BASE = "https://celulas-backend.onrender.com";
function protegerPagina(){ if(localStorage.getItem("logado")!=="sim"){ window.location.href="login.html"; return false;} return true;}
function preencherUsuarioLogado(){ const el=document.getElementById("usuarioLogado"); if(!el) return; el.textContent=`Usuário: ${localStorage.getItem("nomeUsuario")||"Administrador"} | Nível: ${localStorage.getItem("nivelUsuario")||"admin"}`; }
function sairSistema(){ localStorage.clear(); window.location.href="login.html"; }
function normalizarTexto(valor){ return String(valor||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim().toUpperCase(); }
function formatarCep(valor){ const n=String(valor||"").replace(/\D/g,"").slice(0,8); return n.length>5?`${n.slice(0,5)}-${n.slice(5)}`:n; }
let membros=[];if(protegerPagina())iniciarCadastro();function v(i){return document.getElementById(i).value;}function setv(i,val){document.getElementById(i).value=val||"";}function dadosFormulario(){return{nome:normalizarTexto(v("nome")),telefone:v("telefone").trim(),celula:normalizarTexto(v("celula")),nascimento:v("nascimento"),status:normalizarTexto(v("status")),cep:v("cep").replace(/\D/g,""),rua:normalizarTexto(v("rua")),numero:normalizarTexto(v("numero")),complemento:normalizarTexto(v("complemento")),bairro:normalizarTexto(v("bairro")),cidade:normalizarTexto(v("cidade")),estado:normalizarTexto(v("estado")),observacoes:normalizarTexto(v("observacoes"))};}function limparCadastro(){["membroId","nome","telefone","celula","nascimento","cep","rua","numero","complemento","bairro","cidade","estado","observacoes"].forEach(id=>setv(id,""));setv("status","ATIVO");document.getElementById("btnSalvar").textContent="Salvar membro";document.getElementById("msg").textContent="";}async function iniciarCadastro(){document.getElementById("btnSalvar").addEventListener("click",salvarMembro);document.getElementById("btnNovo").addEventListener("click",limparCadastro);document.getElementById("cep").addEventListener("input",e=>e.target.value=formatarCep(e.target.value));document.getElementById("cep").addEventListener("blur",buscarCep);await carregarMembros();}async function buscarCep(){const cep=v("cep").replace(/\D/g,"");if(cep.length!==8)return;try{const r=await fetch(`https://viacep.com.br/ws/${cep}/json/`);const d=await r.json();if(d.erro)return;setv("rua",normalizarTexto(d.logradouro));setv("bairro",normalizarTexto(d.bairro));setv("cidade",normalizarTexto(d.localidade));setv("estado",normalizarTexto(d.uf));}catch(e){}}async function carregarMembros(){const lista=document.getElementById("listaMembros");try{const r=await fetch(API_BASE+"/membros",{cache:"no-store"});if(!r.ok)throw new Error();membros=await r.json();document.getElementById("contador").textContent=`${membros.length} membro(s)`;lista.innerHTML=membros.length?membros.map(m=>`<div class="item"><h3>${m.nome||""}</h3><p><strong>Telefone:</strong> ${m.telefone||"-"}</p><p><strong>Célula:</strong> ${m.celula||"-"}</p><p><strong>Nascimento:</strong> ${m.nascimento||"-"}</p><p><strong>Endereço:</strong> ${[m.rua,m.numero,m.bairro,m.cidade,m.estado,m.cep].filter(Boolean).join(" - ")||"-"}</p><p><strong>Observações:</strong> ${m.observacoes||"-"}</p><p><span class="badge">${m.status||"-"}</span></p><div class="acoes"><button class="btn-primario" type="button" onclick="editarMembro(${m.id})">Editar</button><button class="btn-perigo" type="button" onclick="excluirMembro(${m.id})">Excluir</button></div></div>`).join(""):'<div class="vazio">Nenhum membro cadastrado.</div>';}catch(e){lista.innerHTML='<div class="vazio">Erro ao carregar membros.</div>';}}window.editarMembro=function(id){const m=membros.find(x=>Number(x.id)===Number(id));if(!m)return;setv("membroId",m.id);setv("nome",m.nome);setv("telefone",m.telefone);setv("celula",m.celula);setv("nascimento",m.nascimento);setv("status",m.status||"ATIVO");setv("cep",formatarCep(m.cep));setv("rua",m.rua);setv("numero",m.numero);setv("complemento",m.complemento);setv("bairro",m.bairro);setv("cidade",m.cidade);setv("estado",m.estado);setv("observacoes",m.observacoes);document.getElementById("btnSalvar").textContent="Atualizar membro";window.scrollTo({top:0,behavior:"smooth"});};window.excluirMembro=async function(id){if(!confirm("Excluir este membro?"))return;try{const r=await fetch(API_BASE+`/membros/${id}`,{method:"DELETE"});if(!r.ok)throw new Error();await carregarMembros();}catch(e){document.getElementById("msg").textContent="Erro ao excluir membro.";document.getElementById("msg").style.color="#dc2626";}};async function salvarMembro(){const msg=document.getElementById("msg");const id=v("membroId");const dados=dadosFormulario();if(!dados.nome){msg.textContent="Informe o nome.";msg.style.color="#dc2626";return;}try{const r=await fetch(API_BASE+(id?`/membros/${id}`:"/membros"),{method:id?"PUT":"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(dados)});if(!r.ok)throw new Error();msg.textContent=id?"Membro atualizado com sucesso!":"Membro salvo com sucesso!";msg.style.color="#16a34a";limparCadastro();await carregarMembros();}catch(e){msg.textContent="Erro ao salvar membro.";msg.style.color="#dc2626";}}document.getElementById("btnSair")?.addEventListener("click", sairSistema); preencherUsuarioLogado();</script></body></html>
