<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>+Células | Relatórios V9</title>

  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#eef2f7}
    .layout{display:flex;min-height:100vh}
    .sidebar{
      width:250px;
      background:linear-gradient(180deg,#1d4ed8,#16a34a);
      color:#fff;
      padding:24px 18px;
      position:fixed;
      height:100%;
    }
    .menu a{
      display:block;color:#fff;padding:12px;
      text-decoration:none;border-radius:10px;
      margin-bottom:6px;font-weight:bold;
    }
    .content{
      margin-left:250px;
      width:calc(100% - 250px);
      padding:30px;
    }
    .card{
      background:#fff;
      padding:22px;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,.05);
      margin-bottom:20px;
    }
    .acoes{
      display:flex;
      gap:12px;
      margin-top:20px;
      flex-wrap:wrap;
    }
    .btn{
      padding:14px 18px;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
      color:#fff;
    }
    .pdf{background:#2563eb}
    .backup{background:#16a34a}
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h2>+Células</h2>
    <div class="menu">
      <a href="painel.html">Painel</a>
      <a href="cadastro.html">Membros</a>
      <a href="presenca.html">Presença</a>
      <a href="celulas.html">Células</a>
      <a href="relatorios.html">Relatórios</a>
    </div>
  </aside>

  <main class="content">
    <div class="card">
      <h1>Relatórios Premium V9</h1>
      <p>Exportação profissional e backup seguro do sistema.</p>

      <div class="acoes">
        <button class="btn pdf" onclick="baixarPDF()">Exportar PDF</button>
        <button class="btn backup" onclick="baixarBackup()">Backup JSON</button>
      </div>
    </div>
  </main>
</div>

<script>
const API = "https://celulas-backend.onrender.com";

function baixarPDF(){
  window.open(API + "/relatorio-pdf", "_blank");
}

function baixarBackup(){
  window.open(API + "/backup", "_blank");
}
</script>
</body>
</html>
