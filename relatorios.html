<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>+Células | Relatórios</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, #1d4ed8, #16a34a);
      color: white;
      padding: 24px 18px;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .logo-sub {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 28px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu a {
      text-decoration: none;
      color: white;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
      display: block;
    }

    .menu a:hover,
    .menu a.ativo {
      background: rgba(255,255,255,0.18);
    }

    .content {
      margin-left: 250px;
      flex: 1;
      padding: 30px;
    }

    .header {
      background: white;
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .header p {
      margin: 0;
      color: #4b5563;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      margin-bottom: 18px;
    }

    .card h2 {
      margin-top: 0;
    }

    .item {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .vazio {
      text-align: center;
      color: #6b7280;
      padding: 24px;
      border: 2px dashed #d1d5db;
      border-radius: 14px;
      background: #fcfcfc;
    }

    @media (max-width: 900px) {
      .sidebar {
        position: relative;
        width: 100%;
        bottom: auto;
      }

      .layout {
        flex-direction: column;
      }

      .content {
        margin-left: 0;
      }
    }
  </style>
</head>
<script>
  if (localStorage.getItem('logado') !== 'sim') {
    window.location.href = 'login.html';
  }

  const nomeUsuario = localStorage.getItem('nomeUsuario') || 'Administrador';
  const nivelUsuario = localStorage.getItem('nivelUsuario') || 'lider';

  function sair() {
    localStorage.removeItem('logado');
    localStorage.removeItem('usuario');
    localStorage.removeItem('nomeUsuario');
    localStorage.removeItem('nivelUsuario');
    window.location.href = 'login.html';
  }

  const campoUsuario = document.getElementById('usuarioLogado');
  if (campoUsuario) {
    campoUsuario.textContent = `Usuário logado: ${nomeUsuario} • Nível: ${nivelUsuario}`;
  }

  function verificarPermissao(pagina) {
    const permissoes = {
      admin: ['painel', 'membros', 'presenca', 'relatorios', 'usuarios'],
      supervisor: ['painel', 'membros', 'presenca', 'relatorios'],
      lider: ['painel', 'membros', 'presenca']
    };

    const permitidas = permissoes[nivelUsuario] || [];

    if (!permitidas.includes(pagina)) {
      alert('Você não tem permissão para acessar esta área.');
      window.location.href = 'painel.html';
    }
  }

  function aplicarPermissoesMenu() {
    const menuUsuarios = document.getElementById('menuUsuarios');
    const menuRelatorios = document.getElementById('menuRelatorios');

    if (nivelUsuario !== 'admin' && menuUsuarios) {
      menuUsuarios.style.display = 'none';
    }

    if (nivelUsuario === 'lider' && menuRelatorios) {
      menuRelatorios.style.display = 'none';
    }
  }

  aplicarPermissoesMenu();
</script>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">+Células</div>
      <div class="logo-sub">Gestão de células</div>

      <nav class="menu">
        <a href="painel.html">Painel</a>
        <a href="cadastro.html">Membros</a>
        <a href="presenca.html">Presença</a>
        <a href="relatorios.html" id="menuRelatorios">Relatórios</a>
        <a href="usuarios.html" id="menuUsuarios">Usuários</a>
<script>
  verificarPermissao('usuarios');
</script>
<div style="margin-top: 20px;">
  <button onclick="sair()" style="width:100%;padding:12px;border:none;border-radius:12px;background:#dc2626;color:white;font-weight:bold;cursor:pointer;">
    Sair
  </button>
</div>
      </nav>
    </aside>

    <main class="content">
      <div class="header">
        <h1>Relatórios</h1>
        <p>Resumo de frequência por membro</p>
      </div>

      <div class="card">
        <h2>Resumo de frequência por membro</h2>
        <div id="relatorioFrequencia"></div>
      </div>
    </main>
  </div>

  <script>
    const apiMembros = 'https://celulas-backend.onrender.com:3000/membros';
    const apiPresencas = 'https://celulas-backend.onrender.com:3000/presencas';

    async function carregarRelatorio() {
      const [resMembros, resPresencas] = await Promise.all([
        fetch(apiMembros),
        fetch(apiPresencas)
      ]);

      const membros = await resMembros.json();
      const presencas = await resPresencas.json();

      const container = document.getElementById('relatorioFrequencia');

      if (membros.length === 0) {
        container.innerHTML = '<div class="vazio">Nenhum membro cadastrado.</div>';
        return;
      }

      const html = membros.map(membro => {
        const registros = presencas.filter(p => p.membroId === membro.id);
        const presentes = registros.filter(p => p.status === 'presente').length;
        const ausentes = registros.filter(p => p.status === 'ausente').length;
        const total = registros.length;

        return `
          <div class="item">
            <strong>${membro.nome}</strong><br>
            Total de registros: ${total}<br>
            Presentes: ${presentes}<br>
            Ausentes: ${ausentes}
          </div>
        `;
      }).join('');

      container.innerHTML = html;
    }

    carregarRelatorio();
  </script>
</body>
<script>
  if (localStorage.getItem('logado') !== 'sim') {
    window.location.href = 'login.html';
  }

  function sair() {
    localStorage.removeItem('logado');
    localStorage.removeItem('usuario');
    window.location.href = 'login.html';
  }
</script>
</html>
