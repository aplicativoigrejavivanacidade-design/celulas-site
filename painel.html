<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>+Células | Painel</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef2f7;
  color: #1f2937;
}

.layout {
  display: flex;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 250px;
  background: linear-gradient(180deg, #1d4ed8, #16a34a);
  color: white;
  padding: 24px 18px;
  position: fixed;
  height: 100%;
}

.logo {
  font-size: 30px;
  font-weight: bold;
}

.logo-sub {
  font-size: 13px;
  opacity: 0.9;
  margin-bottom: 30px;
}

.menu a {
  display: block;
  padding: 12px;
  margin-bottom: 6px;
  border-radius: 10px;
  color: white;
  text-decoration: none;
  font-weight: bold;
}

.menu a:hover,
.menu a.ativo {
  background: rgba(255,255,255,0.18);
}

/* CONTENT */
.content {
  margin-left: 250px;
  padding: 30px;
  width: calc(100% - 250px);
}

/* HEADER */
.hero {
  background: white;
  padding: 25px;
  border-radius: 16px;
  margin-bottom: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.hero h1 {
  margin: 0;
}

.hero p {
  margin-top: 5px;
  color: #6b7280;
}

/* CARDS */
.resumo {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-bottom: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.card h3 {
  margin: 0;
  font-size: 14px;
  color: #6b7280;
}

.numero {
  font-size: 32px;
  font-weight: bold;
  margin-top: 10px;
}

/* LISTA */
.secao {
  background: white;
  padding: 20px;
  border-radius: 16px;
}

.lista {
  margin-top: 10px;
}

.item {
  border: 1px solid #e5e7eb;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.vazio {
  text-align: center;
  color: #6b7280;
  padding: 20px;
}

/* RESPONSIVO */
@media(max-width:900px){
  .layout { flex-direction: column; }
  .sidebar { position: relative; width: 100%; }
  .content { margin-left: 0; width: 100%; }
  .resumo { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">+Células</div>
  <div class="logo-sub">Gestão de células</div>

  <div class="menu">
    <a href="painel.html" class="ativo">Painel</a>
    <a href="cadastro.html">Membros</a>
    <a href="presenca.html">Presença</a>
    <a href="relatorios.html" id="menuRelatorios">Relatórios</a>
    <a href="usuarios.html" id="menuUsuarios">Usuários</a>
  </div>

  <button id="btnSair" style="margin-top:20px;width:100%;padding:10px;border:none;border-radius:10px;background:#dc2626;color:white;font-weight:bold;">
    Sair
  </button>
</div>

<!-- CONTENT -->
<div class="content">

<div class="hero">
  <h1>Painel principal</h1>
  <p>Visão geral do sistema</p>
  <p id="usuarioLogado"></p>
</div>

<div class="resumo">
  <div class="card">
    <h3>Total membros</h3>
    <div class="numero" id="totalMembros">0</div>
  </div>

  <div class="card">
    <h3>Presentes hoje</h3>
    <div class="numero" id="presentesHoje">0</div>
  </div>

  <div class="card">
    <h3>Ausentes hoje</h3>
    <div class="numero" id="ausentesHoje">0</div>
  </div>

  <div class="card">
    <h3>Total registros</h3>
    <div class="numero" id="totalPresencas">0</div>
  </div>
</div>

<div class="secao">
  <h2>Últimos membros</h2>
  <div id="ultimosMembros"></div>
</div>

</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const API_MEMBROS = "https://celulas-backend.onrender.com/membros";
const API_PRESENCAS = "https://celulas-backend.onrender.com/presencas";

if(localStorage.getItem("logado")!=="sim"){
  window.location.href="login.html";
  return;
}

const nome = localStorage.getItem("nomeUsuario");
const nivel = localStorage.getItem("nivelUsuario");

document.getElementById("usuarioLogado").innerText =
`Usuário: ${nome} | Nível: ${nivel}`;

document.getElementById("btnSair").onclick = ()=>{
  localStorage.clear();
  window.location.href="login.html";
};

try{

const res1 = await fetch(API_MEMBROS);
const membros = await res1.json();

const res2 = await fetch(API_PRESENCAS);
const presencas = await res2.json();

document.getElementById("totalMembros").innerText = membros.length;
document.getElementById("totalPresencas").innerText = presencas.length;

const hoje = new Date().toISOString().slice(0,10);

const hojeLista = presencas.filter(p=>p.data===hoje);

document.getElementById("presentesHoje").innerText =
hojeLista.filter(p=>p.status==="presente").length;

document.getElementById("ausentesHoje").innerText =
hojeLista.filter(p=>p.status==="ausente").length;

const ultimos = membros.slice(-5).reverse();

document.getElementById("ultimosMembros").innerHTML =
ultimos.length ? ultimos.map(m=>`
<div class="item">
<b>${m.nome}</b><br>
${m.telefone||"-"}<br>
${m.celula||"-"}
</div>
`).join("") : "<div class='vazio'>Nenhum membro</div>";

}catch(e){
document.getElementById("ultimosMembros").innerHTML =
"<div class='vazio'>Erro ao carregar dados</div>";
}

});
</script>

</body>
</html>
