<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>+Células | Usuários</title>

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#eef2f7;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe3ee;
      --blue:#2563eb;
      --blue-dark:#1d4ed8;
      --amber:#f59e0b;
      --red:#dc2626;
      --shadow:0 10px 25px rgba(0,0,0,0.05);
      --radius:16px;
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .layout{display:flex;min-height:100vh;}

    .sidebar{
      width:250px;
      background:linear-gradient(180deg,var(--blue-dark),#16a34a);
      color:#fff;
      padding:24px 18px;
      position:fixed;
      top:0;
      left:0;
      height:100%;
    }

    .logo{font-size:30px;font-weight:bold;margin:0;}
    .logo-sub{margin:6px 0 28px;font-size:13px;opacity:.9;}

    .menu a{
      display:block;
      color:#fff;
      padding:12px;
      text-decoration:none;
      border-radius:10px;
      margin-bottom:6px;
      font-weight:bold;
    }

    .menu a:hover,.menu a.ativo{
      background:rgba(255,255,255,.16);
    }

    .btn-sair{
      margin-top:20px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:12px;
      background:var(--red);
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    .content{
      margin-left:250px;
      padding:30px;
      width:calc(100% - 250px);
    }

    .header,.card{
      background:var(--card);
      padding:22px;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .header{margin-bottom:20px;}
    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    label{
      display:block;
      margin-top:12px;
      margin-bottom:6px;
      font-weight:bold;
    }

    input,select{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--line);
    }

    .acoes{
      display:flex;
      gap:10px;
      margin-top:16px;
      flex-wrap:wrap;
    }

    button{
      padding:12px 14px;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .btn-primario{background:var(--blue);color:#fff;}
    .btn-aviso{background:var(--amber);color:#fff;}
    .btn-perigo{background:var(--red);color:#fff;}

    .item{
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px;
      margin-bottom:10px;
      background:#fafbfd;
    }

    .badge{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:bold;
      background:#e8f0ff;
      color:var(--blue-dark);
    }

    .msg{margin-top:14px;font-weight:bold;min-height:20px;}

    @media(max-width:900px){
      .layout{flex-direction:column;}
      .sidebar{position:relative;width:100%;height:auto;}
      .content{margin-left:0;width:100%;padding:20px;}
      .grid-2{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h2 class="logo">+Células</h2>
    <div class="logo-sub">Gestão de células</div>

    <div class="menu">
      <a href="painel.html">Painel</a>
      <a href="cadastro.html">Membros</a>
      <a href="presenca.html">Presença</a>
      <a href="celulas.html">Células</a>
      <a href="relatorios.html">Relatórios</a>
      <a href="usuarios.html" class="ativo">Usuários</a>
    </div>

    <button class="btn-sair" id="btnSair">Sair</button>
  </aside>

  <main class="content">
    <div class="header">
      <h1>Usuários</h1>
      <p>Gestão de usuários do sistema</p>
      <p id="usuarioLogado"></p>
    </div>

    <div class="grid-2">
      <div class="card">
        <input id="usuarioId" type="hidden">

        <label>Nome</label>
        <input id="nome" type="text">

        <label>Usuário</label>
        <input id="usuario" type="text">

        <label>Senha</label>
        <input id="senha" type="text">

        <label>Nível</label>
        <select id="nivel">
          <option value="ADMIN">ADMIN</option>
          <option value="LIDER">LÍDER</option>
        </select>

        <div class="acoes">
          <button id="btnSalvar" class="btn-primario">Salvar usuário</button>
          <button id="btnNovo" class="btn-aviso">Novo</button>
        </div>

        <div id="msg" class="msg"></div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <h2 style="margin:0;">Lista de usuários</h2>
          <span class="badge" id="contador">0 usuário(s)</span>
        </div>

        <div id="listaUsuarios"></div>
      </div>
    </div>
  </main>
</div>

<script>
const API = "https://celulas-backend.onrender.com";
let usuarios = [];

if(localStorage.getItem("logado") !== "sim"){
  window.location.href = "login.html";
}

document.getElementById("usuarioLogado").textContent =
  `Usuário: ${localStorage.getItem("nomeUsuario") || "Administrador"}`;

document.getElementById("btnSair").onclick = function(){
  localStorage.clear();
  window.location.href = "login.html";
};

function limpar(){
  ["usuarioId","nome","usuario","senha"].forEach(id => {
    document.getElementById(id).value = "";
  });
  document.getElementById("nivel").value = "ADMIN";
}

async function carregarUsuarios(){
  const lista = document.getElementById("listaUsuarios");

  try{
    const resp = await fetch(API + "/usuarios",{cache:"no-store"});
    usuarios = await resp.json();

    document.getElementById("contador").textContent =
      `${usuarios.length} usuário(s)`;

    lista.innerHTML = usuarios.map(u => `
      <div class="item">
        <h3>${u.nome}</h3>
        <p><strong>Usuário:</strong> ${u.usuario}</p>
        <p><strong>Nível:</strong> ${u.nivel}</p>

        <div class="acoes">
          <button class="btn-primario" onclick="editar(${u.id})">Editar</button>
          <button class="btn-perigo" onclick="excluirUsuario(${u.id})">Excluir</button>
        </div>
      </div>
    `).join("");

  }catch{
    lista.innerHTML = "Erro ao carregar usuários.";
  }
}

window.editar = function(id){
  const u = usuarios.find(x => Number(x.id) === Number(id));
  if(!u) return;

  document.getElementById("usuarioId").value = u.id;
  document.getElementById("nome").value = u.nome;
  document.getElementById("usuario").value = u.usuario;
  document.getElementById("senha").value = u.senha;
  document.getElementById("nivel").value = u.nivel;
};

window.excluirUsuario = async function(id){
  await fetch(API + "/usuarios/" + id,{method:"DELETE"});
  carregarUsuarios();
};

document.getElementById("btnNovo").onclick = limpar;

document.getElementById("btnSalvar").onclick = async function(){
  const id = document.getElementById("usuarioId").value;
  const msg = document.getElementById("msg");

  const dados = {
    nome: document.getElementById("nome").value,
    usuario: document.getElementById("usuario").value,
    senha: document.getElementById("senha").value,
    nivel: document.getElementById("nivel").value
  };

  try{
    await fetch(API + (id ? "/usuarios/" + id : "/usuarios"),{
      method:id ? "PUT" : "POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(dados)
    });

    msg.textContent = "Usuário salvo com sucesso!";
    msg.style.color = "#16a34a";

    limpar();
    carregarUsuarios();

  }catch{
    msg.textContent = "Erro ao salvar.";
    msg.style.color = "#dc2626";
  }
};

carregarUsuarios();
</script>
</body>
</html>
