<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>+Células | Login</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --green: #16a34a;
      --red: #dc2626;
      --muted: #6b7280;
      --shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--blue-dark), #0f766e);
      padding: 20px;
    }

    .card-login {
      width: 100%;
      max-width: 460px;
      background: white;
      padding: 30px;
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 42px;
      color: var(--blue);
      text-align: center;
    }

    .sub {
      text-align: center;
      color: var(--muted);
      margin-bottom: 22px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
      color: #111827;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #dbe3ee;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--blue);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: var(--blue-dark);
    }

    .msg {
      margin-top: 16px;
      font-weight: bold;
      min-height: 22px;
      text-align: center;
    }

    .box-ajuda {
      background: #eef4ff;
      padding: 14px;
      border-radius: 14px;
      margin-top: 20px;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="card-login">
    <h1>+Células</h1>
    <div class="sub">Acesse o sistema com seu usuário</div>

    <label>Usuário</label>
    <input id="usuario" type="text" value="admin" />

    <label>Senha</label>
    <input id="senha" type="password" value="1234" />

    <button id="btnEntrar" type="button">Entrar</button>

    <div id="msg" class="msg"></div>

    <div class="box-ajuda">
      <strong>Acesso inicial:</strong><br />
      Usuário: <strong>admin</strong><br />
      Senha: <strong>1234</strong>
    </div>
  </div>

  <script>
    const API_BASE = "https://celulas-backend.onrender.com";

    document.getElementById("btnEntrar").addEventListener("click", async () => {
      const usuario = document.getElementById("usuario").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const msg = document.getElementById("msg");

      msg.textContent = "Entrando...";
      msg.style.color = "#6b7280";

      try {
        const resp = await fetch(API_BASE + "/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ usuario, senha })
        });

        const data = await resp.json().catch(() => ({}));

        if (!resp.ok || !data.usuario) {
          msg.textContent = "Usuário ou senha inválidos.";
          msg.style.color = "#dc2626";
          return;
        }

        localStorage.setItem("logado", "sim");
        localStorage.setItem("usuario", data.usuario.usuario || usuario);
        localStorage.setItem("nomeUsuario", data.usuario.nome || "Administrador");
        localStorage.setItem("nivelUsuario", data.usuario.nivel || "admin");

        msg.textContent = "Login realizado com sucesso!";
        msg.style.color = "#16a34a";

        setTimeout(() => {
          window.location.href = "painel.html";
        }, 500);

      } catch (erro) {
        msg.textContent = "Erro ao conectar ao servidor.";
        msg.style.color = "#dc2626";
      }
    });
  </script>

</body>
</html>
