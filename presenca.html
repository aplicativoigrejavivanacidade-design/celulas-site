<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>+Células | Presença</title>

  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#eef2f7;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe3ee;
      --blue:#2563eb;
      --blue-dark:#1d4ed8;
      --green:#16a34a;
      --red:#dc2626;
      --shadow:0 10px 25px rgba(0,0,0,0.05);
      --radius:16px;
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .layout{display:flex;min-height:100vh;}

    .sidebar{
      width:250px;
      background:linear-gradient(180deg,var(--blue-dark),var(--green));
      color:#fff;
      padding:24px 18px;
      position:fixed;
      top:0;
      left:0;
      height:100%;
    }

    .logo{font-size:30px;font-weight:bold;margin:0;}
    .logo-sub{margin:6px 0 28px;font-size:13px;opacity:.9;}

    .menu a{
      display:block;
      color:#fff;
      padding:12px;
      text-decoration:none;
      border-radius:10px;
      margin-bottom:6px;
      font-weight:bold;
    }

    .menu a:hover,.menu a.ativo{
      background:rgba(255,255,255,.16);
    }

    .btn-sair{
      margin-top:20px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:12px;
      background:var(--red);
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    .content{
      margin-left:250px;
      padding:30px;
      width:calc(100% - 250px);
    }

    .header,.card{
      background:var(--card);
      padding:22px;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .header{margin-bottom:20px;}
    .header h1{margin:0 0 8px;font-size:30px;}
    .header p{margin:0;color:var(--muted);}

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      align-items:end;
    }

    label{
      display:block;
      margin-top:12px;
      margin-bottom:6px;
      font-weight:bold;
    }

    input{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--line);
    }

    .acoes{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      padding:12px 14px;
      border-radius:10px;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }

    .btn-primario{background:var(--blue);color:#fff;}
    .btn-sucesso{background:var(--green);color:#fff;}

    .item{
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px;
      margin-bottom:10px;
      background:#fafbfd;
    }

    .msg{
      margin-top:14px;
      font-weight:bold;
      min-height:20px;
    }

    .vazio{
      color:var(--muted);
      text-align:center;
      padding:20px;
      border:2px dashed var(--line);
      border-radius:12px;
      background:#fcfdff;
    }

    @media(max-width:900px){
      .layout{flex-direction:column;}
      .sidebar{position:relative;width:100%;height:auto;}
      .content{margin-left:0;width:100%;padding:20px;}
      .grid-2{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h2 class="logo">+Células</h2>
    <div class="logo-sub">Gestão de células</div>

    <div class="menu">
      <a href="painel.html">Painel</a>
      <a href="cadastro.html">Membros</a>
      <a href="presenca.html" class="ativo">Presença</a>
      <a href="celulas.html">Células</a>
      <a href="relatorios.html">Relatórios</a>
      <a href="usuarios.html">Usuários</a>
    </div>

    <button class="btn-sair" id="btnSair">Sair</button>
  </aside>

  <main class="content">
    <div class="header">
      <h1>Presença</h1>
      <p>Registre a presença dos membros</p>
      <p id="usuarioLogado"></p>
    </div>

    <div class="card">
      <div class="grid-2">
        <div>
          <label>Data</label>
          <input id="dataPresenca" type="date">
        </div>

        <div class="acoes">
          <button id="btnCarregar" class="btn-primario">Carregar</button>
          <button id="btnSalvarPresenca" class="btn-sucesso">Salvar presença</button>
        </div>
      </div>

      <div id="msg" class="msg"></div>
      <div id="listaPresenca" style="margin-top:16px"></div>
    </div>
  </main>
</div>

<script>
const API = "https://celulas-backend.onrender.com";
let membros = [];

if(localStorage.getItem("logado") !== "sim"){
  window.location.href = "login.html";
}

document.getElementById("usuarioLogado").textContent =
  `Usuário: ${localStorage.getItem("nomeUsuario") || "Administrador"}`;

document.getElementById("btnSair").onclick = function(){
  localStorage.clear();
  window.location.href = "login.html";
};

function hoje(){
  const d = new Date();
  return d.toISOString().split("T")[0];
}

document.getElementById("dataPresenca").value = hoje();

async function carregarPresenca(){
  const data = document.getElementById("dataPresenca").value;
  const lista = document.getElementById("listaPresenca");
  lista.innerHTML = '<div class="vazio">Carregando...</div>';

  try{
    const [rm,rp] = await Promise.all([
      fetch(API + "/membros",{cache:"no-store"}),
      fetch(API + "/presencas/" + data,{cache:"no-store"})
    ]);

    const membrosJson = await rm.json();
    const presencas = await rp.json();

    membros = membrosJson;

    const mapa = new Map(
      presencas.map(p => [Number(p.membroId), p.status])
    );

    if(!membros.length){
      lista.innerHTML = '<div class="vazio">Nenhum membro cadastrado.</div>';
      return;
    }

    lista.innerHTML = membros.map(m => {
      const status = mapa.get(Number(m.id)) || "";

      return `
        <div class="item">
          <strong>${m.nome}</strong><br>
          ${m.celula || "SEM CÉLULA"}

          <div class="acoes" style="margin-top:10px;">
            <label>
              <input type="radio" name="st_${m.id}" value="PRESENTE"
                ${status === "PRESENTE" ? "checked" : ""}>
              Presente
            </label>

            <label>
              <input type="radio" name="st_${m.id}" value="AUSENTE"
                ${status === "AUSENTE" ? "checked" : ""}>
              Ausente
            </label>
          </div>
        </div>
      `;
    }).join("");

  }catch{
    lista.innerHTML = '<div class="vazio">Erro ao carregar presença.</div>';
  }
}

async function salvarPresenca(){
  const data = document.getElementById("dataPresenca").value;
  const msg = document.getElementById("msg");

  const registros = membros.map(m => {
    const marcado = document.querySelector(`input[name="st_${m.id}"]:checked`);
    return marcado ? {
      membroId:Number(m.id),
      status:marcado.value
    } : null;
  }).filter(Boolean);

  if(!registros.length){
    msg.textContent = "Selecione presença ou ausência.";
    msg.style.color = "#dc2626";
    return;
  }

  try{
    const resp = await fetch(API + "/presencas",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({data, registros})
    });

    if(!resp.ok){
      throw new Error();
    }

    msg.textContent = "Presença salva com sucesso!";
    msg.style.color = "#16a34a";

  }catch{
    msg.textContent = "Erro ao salvar presença.";
    msg.style.color = "#dc2626";
  }
}

document.getElementById("btnCarregar").onclick = carregarPresenca;
document.getElementById("btnSalvarPresenca").onclick = salvarPresenca;

carregarPresenca();
</script>
</body>
</html>
