<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>+Células | Membros</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, #1d4ed8, #16a34a);
      color: white;
      padding: 20px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      box-sizing: border-box;
    }

    .sidebar h2 {
      margin-top: 0;
      font-size: 28px;
    }

    .menu a {
      display: block;
      color: white;
      padding: 12px;
      text-decoration: none;
      border-radius: 10px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .menu a:hover {
      background: rgba(255,255,255,0.15);
    }

    .content {
      margin-left: 250px;
      padding: 30px;
      width: calc(100% - 250px);
      box-sizing: border-box;
    }

    .header {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0 0 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-sizing: border-box;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 15px;
    }

    input, textarea {
      text-transform: uppercase;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-salvar { background: #2563eb; color: white; }
    .btn-limpar { background: #f59e0b; color: white; }
    .btn-editar { background: #2563eb; color: white; margin-right: 8px; }
    .btn-excluir { background: #dc2626; color: white; }

    .acoes-form {
      display: flex;
      gap: 10px;
    }

    .lista-membro {
      border: 1px solid #ddd;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .lista-membro h3 {
      margin: 0 0 10px;
    }

    .vazio {
      color: #6b7280;
      font-style: italic;
    }

    #msg {
      margin-top: 12px;
      font-weight: bold;
    }

    @media (max-width: 900px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }

      .content {
        margin-left: 0;
        width: 100%;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <h2>+Células</h2>
      <div class="menu">
        <a href="painel.html">Painel</a>
        <a href="cadastro.html">Membros</a>
        <a href="presenca.html">Presença</a>
        <a href="relatorios.html">Relatórios</a>
        <a href="usuarios.html">Usuários</a>
      </div>
    </div>

    <div class="content">
      <div class="header">
        <h1>Cadastro de membros</h1>
        <p>Cadastre e gerencie os membros</p>
      </div>

      <div class="grid">
        <div class="card">
          <h2 id="tituloForm">Novo membro</h2>

          <input id="membroId" type="hidden">

          <label for="nome">Nome</label>
          <input id="nome">

          <label for="telefone">Telefone</label>
          <input id="telefone">

          <label for="celula">Célula</label>
          <input id="celula">

          <label for="nascimento">Nascimento</label>
          <input id="nascimento" type="date">

          <label for="status">Status</label>
          <select id="status">
            <option value="ativo">Ativo</option>
            <option value="visitante">Visitante</option>
            <option value="afastado">Afastado</option>
          </select>

          <label for="cep">CEP</label>
          <input id="cep">

          <label for="rua">Rua</label>
          <input id="rua">

          <label for="numero">Número</label>
          <input id="numero">

          <label for="complemento">Complemento</label>
          <input id="complemento">

          <label for="bairro">Bairro</label>
          <input id="bairro">

          <label for="cidade">Cidade</label>
          <input id="cidade">

          <label for="estado">Estado</label>
          <input id="estado">

          <label for="observacoes">Observações</label>
          <textarea id="observacoes"></textarea>

          <div class="acoes-form">
            <button class="btn-salvar" id="btnSalvar" type="button">Salvar</button>
            <button class="btn-limpar" id="btnLimpar" type="button">Limpar</button>
          </div>

          <p id="msg"></p>
        </div>

        <div class="card">
          <h2>Lista</h2>
          <div id="lista"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const API = "https://celulas-backend.onrender.com/membros";

      const campoMembroId = document.getElementById("membroId");
      const campoNome = document.getElementById("nome");
      const campoTelefone = document.getElementById("telefone");
      const campoCelula = document.getElementById("celula");
      const campoNascimento = document.getElementById("nascimento");
      const campoStatus = document.getElementById("status");
      const campoCep = document.getElementById("cep");
      const campoRua = document.getElementById("rua");
      const campoNumero = document.getElementById("numero");
      const campoComplemento = document.getElementById("complemento");
      const campoBairro = document.getElementById("bairro");
      const campoCidade = document.getElementById("cidade");
      const campoEstado = document.getElementById("estado");
      const campoObservacoes = document.getElementById("observacoes");
      const campoLista = document.getElementById("lista");
      const campoMsg = document.getElementById("msg");
      const tituloForm = document.getElementById("tituloForm");
      const btnSalvar = document.getElementById("btnSalvar");
      const btnLimpar = document.getElementById("btnLimpar");

      function formatarDataParaInput(valor) {
        if (!valor) return "";

        if (/^\d{4}-\d{2}-\d{2}$/.test(valor)) return valor;

        if (/^\d{2}\/\d{2}\/\d{4}$/.test(valor)) {
          const [dia, mes, ano] = valor.split("/");
          return `${ano}-${mes}-${dia}`;
        }

        if (typeof valor === "string" && valor.includes("T")) {
          return valor.split("T")[0];
        }

        const data = new Date(valor);
        if (!isNaN(data.getTime())) {
          const ano = data.getFullYear();
          const mes = String(data.getMonth() + 1).padStart(2, "0");
          const dia = String(data.getDate()).padStart(2, "0");
          return `${ano}-${mes}-${dia}`;
        }

        return "";
      }

      function montarEndereco(m) {
        const partes = [];
        if (m.rua) partes.push(m.rua);
        if (m.numero) partes.push(`Nº ${m.numero}`);
        if (m.complemento) partes.push(m.complemento);
        if (m.bairro) partes.push(m.bairro);
        if (m.cidade) partes.push(m.cidade);
        if (m.estado) partes.push(m.estado);
        if (m.cep) partes.push(`CEP ${m.cep}`);
        return partes.length ? partes.join(" - ") : "-";
      }

      async function carregarLista() {
        try {
          campoLista.innerHTML = '<p class="vazio">Carregando...</p>';

          const resposta = await fetch(API, { cache: "no-store" });

          if (!resposta.ok) {
            throw new Error("Erro ao buscar membros");
          }

          const dados = await resposta.json();

          if (!Array.isArray(dados) || dados.length === 0) {
            campoLista.innerHTML = '<p class="vazio">Nenhum membro cadastrado.</p>';
            return;
          }

          campoLista.innerHTML = dados.map((m) => `
            <div class="lista-membro">
              <h3>${m.nome || ""}</h3>
              <p><strong>Telefone:</strong> ${m.telefone || "-"}</p>
              <p><strong>Célula:</strong> ${m.celula || "-"}</p>
              <p><strong>Nascimento:</strong> ${m.nascimento || "-"}</p>
              <p><strong>Endereço:</strong> ${montarEndereco(m)}</p>
              <p><strong>Observações:</strong> ${m.observacoes || "-"}</p>
              <p><strong>Status:</strong> ${(m.status || "").toUpperCase()}</p>
              <button class="btn-editar" type="button" data-id="${m.id}">Editar</button>
              <button class="btn-excluir" type="button" data-id="${m.id}">Excluir</button>
            </div>
          `).join("");
        } catch (erro) {
          console.error("Erro ao carregar lista:", erro);
          campoLista.innerHTML = '<p class="vazio">⚠️ Erro ao carregar membros. O Render pode estar acordando.</p>';
        }
      }

      async function salvarMembro() {
        try {
          const id = campoMembroId.value;

          const dados = {
            nome: campoNome.value,
            telefone: campoTelefone.value,
            celula: campoCelula.value,
            nascimento: campoNascimento.value,
            status: campoStatus.value,
            observacoes: campoObservacoes.value,
            cep: campoCep.value,
            rua: campoRua.value,
            numero: campoNumero.value,
            complemento: campoComplemento.value,
            bairro: campoBairro.value,
            cidade: campoCidade.value,
            estado: campoEstado.value
          };

          let resposta;

          if (id) {
            resposta = await fetch(`${API}/${id}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(dados)
            });
          } else {
            resposta = await fetch(API, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(dados)
            });
          }

          if (!resposta.ok) {
            throw new Error("Erro ao salvar");
          }

          campoMsg.textContent = id
            ? "MEMBRO ATUALIZADO COM SUCESSO!"
            : "MEMBRO SALVO COM SUCESSO!";

          limparFormulario(false);
          await carregarLista();
        } catch (erro) {
          console.error("Erro ao salvar:", erro);
          campoMsg.textContent = "ERRO AO SALVAR";
        }
      }

      async function editarMembro(id) {
        try {
          const resposta = await fetch(API, { cache: "no-store" });
          const dados = await resposta.json();
          const membro = dados.find((x) => String(x.id) === String(id));

          if (!membro) return;

          campoMembroId.value = membro.id || "";
          campoNome.value = (membro.nome || "").toUpperCase();
          campoTelefone.value = (membro.telefone || "").toUpperCase();
          campoCelula.value = (membro.celula || "").toUpperCase();
          campoNascimento.value = formatarDataParaInput(membro.nascimento || "");
          campoStatus.value = (membro.status || "ativo").toLowerCase();
          campoCep.value = (membro.cep || "").toUpperCase();
          campoRua.value = (membro.rua || "").toUpperCase();
          campoNumero.value = (membro.numero || "").toUpperCase();
          campoComplemento.value = (membro.complemento || "").toUpperCase();
          campoBairro.value = (membro.bairro || "").toUpperCase();
          campoCidade.value = (membro.cidade || "").toUpperCase();
          campoEstado.value = (membro.estado || "").toUpperCase();
          campoObservacoes.value = (membro.observacoes || "").toUpperCase();

          tituloForm.textContent = "Editar membro";
          campoMsg.textContent = "MODO DE EDIÇÃO ATIVADO";
          window.scrollTo({ top: 0, behavior: "smooth" });
        } catch (erro) {
          console.error("Erro ao editar:", erro);
          alert("ERRO AO CARREGAR DADOS DO MEMBRO");
        }
      }

      async function excluirMembro(id) {
        try {
          const confirmar = confirm("DESEJA EXCLUIR ESTE MEMBRO?");
          if (!confirmar) return;

          const resposta = await fetch(`${API}/${id}`, {
            method: "DELETE"
          });

          if (!resposta.ok) {
            throw new Error("Erro ao excluir");
          }

          await carregarLista();
        } catch (erro) {
          console.error("Erro ao excluir:", erro);
          alert("ERRO AO EXCLUIR");
        }
      }

      function limparFormulario(limparMensagem = true) {
        campoMembroId.value = "";
        campoNome.value = "";
        campoTelefone.value = "";
        campoCelula.value = "";
        campoNascimento.value = "";
        campoStatus.value = "ativo";
        campoCep.value = "";
        campoRua.value = "";
        campoNumero.value = "";
        campoComplemento.value = "";
        campoBairro.value = "";
        campoCidade.value = "";
        campoEstado.value = "";
        campoObservacoes.value = "";
        tituloForm.textContent = "Novo membro";

        if (limparMensagem) {
          campoMsg.textContent = "";
        }
      }

      campoCep.addEventListener("blur", async function () {
        const cep = campoCep.value.replace(/\D/g, "");
        if (cep.length !== 8) return;

        try {
          const resposta = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
          const dados = await resposta.json();

          if (dados.erro) {
            alert("CEP NÃO ENCONTRADO");
            return;
          }

          campoRua.value = (dados.logradouro || "").toUpperCase();
          campoBairro.value = (dados.bairro || "").toUpperCase();
          campoCidade.value = (dados.localidade || "").toUpperCase();
          campoEstado.value = (dados.uf || "").toUpperCase();
        } catch (erro) {
          alert("ERRO AO BUSCAR CEP");
        }
      });

      document.querySelectorAll("input, textarea").forEach((campo) => {
        campo.addEventListener("input", () => {
          if (campo.type !== "date" && campo.id !== "cep") {
            campo.value = campo.value.toUpperCase();
          }
        });
      });

      campoLista.addEventListener("click", function (event) {
        const botaoEditar = event.target.closest(".btn-editar");
        const botaoExcluir = event.target.closest(".btn-excluir");

        if (botaoEditar) {
          editarMembro(botaoEditar.dataset.id);
        }

        if (botaoExcluir) {
          excluirMembro(botaoExcluir.dataset.id);
        }
      });

      btnSalvar.addEventListener("click", salvarMembro);
      btnLimpar.addEventListener("click", () => limparFormulario());

      carregarLista();
    });
  </script>
</body>
</html>
