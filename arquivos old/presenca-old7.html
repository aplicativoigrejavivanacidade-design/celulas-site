<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>+Células | Presença</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg:#eef2f7;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe3ee;
      --blue:#2563eb;
      --blue-dark:#1d4ed8;
      --green:#16a34a;
      --amber:#f59e0b;
      --red:#dc2626;
      --shadow:0 10px 25px rgba(0,0,0,0.05);
      --radius:16px;
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .layout{
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width:250px;
      background:linear-gradient(180deg,var(--blue-dark),var(--green));
      color:white;
      padding:24px 18px;
      position:fixed;
      top:0;
      left:0;
      bottom:0;
    }

    .logo{
      font-size:30px;
      font-weight:bold;
      margin-bottom:8px;
    }

    .logo-sub{
      font-size:13px;
      opacity:0.9;
      margin-bottom:28px;
    }

    .menu{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .menu a{
      text-decoration:none;
      color:white;
      padding:12px 14px;
      border-radius:12px;
      font-weight:bold;
      transition:0.2s;
      display:block;
    }

    .menu a:hover,
    .menu a.ativo{
      background:rgba(255,255,255,0.18);
    }

    .btn-sair{
      width:100%;
      background:var(--red);
      color:white;
      margin-top:20px;
      border:none;
      border-radius:12px;
      padding:12px 14px;
      font-weight:bold;
      cursor:pointer;
    }

    .content{
      margin-left:250px;
      flex:1;
      padding:30px;
    }

    .header{
      background:var(--card);
      border-radius:22px;
      padding:24px;
      margin-bottom:24px;
      box-shadow:var(--shadow);
    }

    .header h1{
      margin:0 0 8px;
      font-size:30px;
    }

    .header p{
      margin:0;
      color:var(--muted);
    }

    .usuario-logado{
      margin-top:10px !important;
      font-size:14px;
    }

    .topo{
      display:grid;
      grid-template-columns: 1.3fr 1fr;
      gap:20px;
      margin-bottom:20px;
      align-items:start;
    }

    .card{
      background:var(--card);
      border-radius:18px;
      padding:20px;
      box-shadow:var(--shadow);
    }

    .card h2{
      margin:0 0 14px;
      font-size:22px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
      font-size:14px;
    }

    input, select, button{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--line);
      font-size:15px;
      font-family:inherit;
      background:#fff;
    }

    input:focus, select:focus{
      outline:none;
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(37,99,235,0.12);
    }

    button{
      border:none;
      cursor:pointer;
      font-weight:bold;
      transition:0.2s;
    }

    .btn-success{ background:var(--green); color:white; }
    .btn-primary{ background:var(--blue); color:white; }
    .btn-secondary{ background:var(--amber); color:white; }
    .btn-danger{ background:var(--red); color:white; }

    .acoes-topo{
      display:flex;
      gap:10px;
      margin-top:14px;
      flex-wrap:wrap;
    }

    .acoes-topo button{
      flex:1;
      min-width:180px;
    }

    .resumo{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:8px;
    }

    .badge{
      padding:8px 12px;
      border-radius:999px;
      font-weight:bold;
      font-size:13px;
    }

    .badge-total{ background:#e0f2fe; color:#075985; }
    .badge-presente{ background:#dcfce7; color:#166534; }
    .badge-ausente{ background:#fee2e2; color:#991b1b; }
    .badge-pendente{ background:#fef3c7; color:#92400e; }

    .mensagem{
      margin-top:16px;
      font-size:14px;
      min-height:20px;
      font-weight:bold;
    }

    .lista{
      display:grid;
      gap:12px;
    }

    .membro{
      background:white;
      border-radius:16px;
      padding:16px;
      box-shadow:0 8px 24px rgba(0,0,0,0.05);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      border:1px solid #eef2f7;
    }

    .membro h3{
      margin:0 0 6px;
      font-size:18px;
    }

    .membro p{
      margin:0;
      color:#4b5563;
      font-size:14px;
    }

    .status-atual{
      font-size:13px;
      font-weight:bold;
      margin-top:8px;
      text-transform:uppercase;
    }

    .tag-status{
      display:inline-block;
      margin-top:8px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
      text-transform:uppercase;
    }

    .tag-presente{ background:#dcfce7; color:#166534; }
    .tag-ausente{ background:#fee2e2; color:#991b1b; }
    .tag-pendente{ background:#fef3c7; color:#92400e; }

    .acoes-item{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .btn-item{
      width:auto;
      min-width:100px;
      padding:10px 14px;
    }

    .vazio{
      background:white;
      border-radius:16px;
      padding:30px;
      text-align:center;
      color:var(--muted);
      box-shadow:0 8px 24px rgba(0,0,0,0.05);
      border:2px dashed var(--line);
    }

    @media (max-width: 1100px) {
      .topo{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 900px) {
      .sidebar{
        position:relative;
        width:100%;
        bottom:auto;
      }

      .layout{
        flex-direction:column;
      }

      .content{
        margin-left:0;
      }

      .form-grid{
        grid-template-columns:1fr;
      }

      .membro{
        flex-direction:column;
        align-items:stretch;
      }

      .acoes-item{
        width:100%;
      }

      .acoes-item .btn-item{
        width:100%;
      }

      .acoes-topo{
        flex-direction:column;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">+Células</div>
      <div class="logo-sub">Gestão de células</div>

      <nav class="menu">
        <a href="painel.html">Painel</a>
        <a href="cadastro.html">Membros</a>
        <a href="presenca.html" class="ativo">Presença</a>
        <a href="relatorios.html" id="menuRelatorios">Relatórios</a>
        <a href="usuarios.html" id="menuUsuarios">Usuários</a>
      </nav>

      <button id="btnSair" class="btn-sair" type="button">Sair</button>
    </aside>

    <main class="content">
      <div class="header">
        <h1>Controle de presença</h1>
        <p>Selecione a célula, o membro e lance ou altere a presença por data</p>
        <p id="usuarioLogado" class="usuario-logado"></p>
      </div>

      <div class="topo">
        <div class="card">
          <h2>Lançamento de presença</h2>

          <div class="form-grid">
            <div>
              <label for="dataReuniao">Data da reunião</label>
              <input type="date" id="dataReuniao" />
            </div>

            <div>
              <label for="celulaSelecionada">Célula</label>
              <select id="celulaSelecionada">
                <option value="">Selecione a célula</option>
              </select>
            </div>

            <div>
              <label for="membroSelecionado">Membro</label>
              <select id="membroSelecionado">
                <option value="">Selecione um membro</option>
              </select>
            </div>

            <div>
              <label for="statusSelecionado">Status</label>
              <select id="statusSelecionado">
                <option value="">Selecione o status</option>
                <option value="presente">Presente</option>
                <option value="ausente">Ausente</option>
              </select>
            </div>

            <div style="grid-column: 1 / -1;">
              <label for="statusSalvo">Situação atual</label>
              <input type="text" id="statusSalvo" value="PENDENTE" readonly />
            </div>
          </div>

          <div class="acoes-topo">
            <button class="btn-success" id="btnSalvar" type="button">Salvar presença</button>
            <button class="btn-primary" id="btnAtualizar" type="button">Alterar presença salva</button>
            <button class="btn-secondary" id="btnPresenteTodos" type="button">Marcar todos presentes</button>
            <button class="btn-danger" id="btnAusenteTodos" type="button">Marcar todos ausentes</button>
            <button class="btn-secondary" id="btnLimpar" type="button">Limpar seleção</button>
          </div>

          <div class="mensagem" id="mensagem"></div>
        </div>

        <div class="card">
          <h2>Resumo da chamada</h2>
          <div class="resumo">
            <span class="badge badge-total" id="totalMembros">0 membros</span>
            <span class="badge badge-presente" id="totalPresentes">0 presentes</span>
            <span class="badge badge-ausente" id="totalAusentes">0 ausentes</span>
            <span class="badge badge-pendente" id="totalPendentes">0 pendentes</span>
          </div>
        </div>
      </div>

      <div class="lista" id="listaMembros"></div>
    </main>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const apiMembros = 'https://celulas-backend.onrender.com/membros';
      const apiPresencas = 'https://celulas-backend.onrender.com/presencas';

      if (localStorage.getItem('logado') !== 'sim') {
        window.location.href = 'login.html';
        return;
      }

      const nomeUsuario = localStorage.getItem('nomeUsuario') || 'Administrador';
      const nivelUsuario = localStorage.getItem('nivelUsuario') || 'lider';

      let todosMembros = [];
      let membrosFiltrados = [];
      let presencas = {};

      const campoUsuario = document.getElementById('usuarioLogado');
      const campoLista = document.getElementById('listaMembros');
      const campoMensagem = document.getElementById('mensagem');
      const campoData = document.getElementById('dataReuniao');
      const campoCelula = document.getElementById('celulaSelecionada');
      const campoMembro = document.getElementById('membroSelecionado');
      const campoStatus = document.getElementById('statusSelecionado');
      const campoStatusSalvo = document.getElementById('statusSalvo');

      function sair() {
        localStorage.removeItem('logado');
        localStorage.removeItem('usuario');
        localStorage.removeItem('nomeUsuario');
        localStorage.removeItem('nivelUsuario');
        window.location.href = 'login.html';
      }

      function verificarPermissao(pagina) {
        const permissoes = {
          admin: ['painel', 'membros', 'presenca', 'relatorios', 'usuarios'],
          supervisor: ['painel', 'membros', 'presenca', 'relatorios'],
          lider: ['painel', 'membros', 'presenca']
        };

        const permitidas = permissoes[nivelUsuario] || [];
        if (!permitidas.includes(pagina)) {
          alert('Você não tem permissão para acessar esta área.');
          window.location.href = 'painel.html';
        }
      }

      function aplicarPermissoesMenu() {
        const menuUsuarios = document.getElementById('menuUsuarios');
        const menuRelatorios = document.getElementById('menuRelatorios');

        campoUsuario.textContent = `Usuário: ${nomeUsuario} | Nível: ${nivelUsuario}`;

        if (nivelUsuario !== 'admin' && menuUsuarios) {
          menuUsuarios.style.display = 'none';
        }

        if (nivelUsuario === 'lider' && menuRelatorios) {
          menuRelatorios.style.display = 'none';
        }
      }

      function definirDataHoje() {
        const hoje = new Date();
        const ano = hoje.getFullYear();
        const mes = String(hoje.getMonth() + 1).padStart(2, '0');
        const dia = String(hoje.getDate()).padStart(2, '0');
        campoData.value = `${ano}-${mes}-${dia}`;
      }

      function textoStatus(status) {
        if (status === 'presente') return 'PRESENTE';
        if (status === 'ausente') return 'AUSENTE';
        return 'PENDENTE';
      }

      function classeStatus(status) {
        if (status === 'presente') return 'tag-status tag-presente';
        if (status === 'ausente') return 'tag-status tag-ausente';
        return 'tag-status tag-pendente';
      }

      function limparSelecao(limparMensagem = false) {
        campoCelula.value = '';
        membrosFiltrados = [];
        preencherSelectMembros();
        campoMembro.value = '';
        campoStatus.value = '';
        campoStatusSalvo.value = 'PENDENTE';
        renderizarMembros();
        if (limparMensagem) {
          campoMensagem.textContent = '';
        }
      }

      function atualizarResumo() {
        const base = campoCelula.value ? membrosFiltrados : [];
        const total = base.length;
        const presentes = base.filter((membro) => presencas[membro.id] === 'presente').length;
        const ausentes = base.filter((membro) => presencas[membro.id] === 'ausente').length;
        const pendentes = total - presentes - ausentes;

        document.getElementById('totalMembros').textContent = `${total} membro(s)`;
        document.getElementById('totalPresentes').textContent = `${presentes} presente(s)`;
        document.getElementById('totalAusentes').textContent = `${ausentes} ausente(s)`;
        document.getElementById('totalPendentes').textContent = `${pendentes} pendente(s)`;
      }

      function preencherSelectCelulas() {
        const celulas = [...new Set(
          todosMembros
            .map((membro) => (membro.celula || '').trim().toUpperCase())
            .filter(Boolean)
        )].sort();

        campoCelula.innerHTML = '<option value="">Selecione a célula</option>' + celulas.map((celula) => {
          return `<option value="${celula}">${celula}</option>`;
        }).join('');
      }

      function preencherSelectMembros() {
        campoMembro.innerHTML = '<option value="">Selecione um membro</option>' + membrosFiltrados.map((membro) => {
          return `<option value="${membro.id}">${membro.nome || ''}</option>`;
        }).join('');
      }

      function aplicarFiltroCelula() {
        const celula = campoCelula.value;
        membrosFiltrados = celula
          ? todosMembros.filter((membro) => String(membro.celula || '').trim().toUpperCase() === celula)
          : [];

        preencherSelectMembros();
        campoMembro.value = '';
        campoStatus.value = '';
        campoStatusSalvo.value = 'PENDENTE';
        renderizarMembros();
      }

      function atualizarSituacaoAtual() {
        const membroId = campoMembro.value;
        if (!membroId) {
          campoStatusSalvo.value = 'PENDENTE';
          return;
        }

        const statusAtual = presencas[membroId] || '';
        campoStatusSalvo.value = textoStatus(statusAtual);
      }

      function renderizarMembros() {
        if (!campoCelula.value) {
          campoLista.innerHTML = '<div class="vazio">Selecione uma célula para carregar os membros vinculados a ela.</div>';
          atualizarResumo();
          return;
        }

        if (!Array.isArray(membrosFiltrados) || membrosFiltrados.length === 0) {
          campoLista.innerHTML = '<div class="vazio">Nenhum membro encontrado para a célula selecionada.</div>';
          atualizarResumo();
          return;
        }

        campoLista.innerHTML = membrosFiltrados.map((membro) => {
          const status = presencas[membro.id] || '';

          return `
            <div class="membro">
              <div>
                <h3>${membro.nome || ''}</h3>
                <p><strong>Célula:</strong> ${membro.celula || '-'}</p>
                <p><strong>Telefone:</strong> ${membro.telefone || '-'}</p>
                <div class="status-atual">Status atual:</div>
                <span class="${classeStatus(status)}">${textoStatus(status)}</span>
              </div>

              <div class="acoes-item">
                <button class="btn-primary btn-item" type="button" data-editar="${membro.id}">Selecionar</button>
              </div>
            </div>
          `;
        }).join('');

        atualizarResumo();
      }

      async function carregarPresencasDaData() {
        const data = campoData.value;
        if (!data) return;

        try {
          const resposta = await fetch(`${apiPresencas}/${data}`, { cache: 'no-store' });
          const registros = await resposta.json();

          presencas = {};

          if (Array.isArray(registros)) {
            registros.forEach((registro) => {
              presencas[registro.membroId] = registro.status;
            });
          }

          renderizarMembros();
          atualizarSituacaoAtual();
          campoMensagem.textContent = '';
        } catch (erro) {
          console.error(erro);
          campoMensagem.textContent = 'Erro ao carregar presenças.';
          campoMensagem.style.color = '#dc2626';
        }
      }

      async function carregarMembros() {
        try {
          campoLista.innerHTML = '<div class="vazio">Carregando membros...</div>';
          const resposta = await fetch(apiMembros, { cache: 'no-store' });
          todosMembros = await resposta.json();

          if (!Array.isArray(todosMembros) || todosMembros.length === 0) {
            todosMembros = [];
            preencherSelectCelulas();
            renderizarMembros();
            return;
          }

          preencherSelectCelulas();
          await carregarPresencasDaData();
          renderizarMembros();
        } catch (erro) {
          console.error(erro);
          campoLista.innerHTML = '<div class="vazio">Erro ao carregar membros.</div>';
        }
      }

      async function salvarOuAtualizarPresenca(tipo) {
        const data = campoData.value;
        const celula = campoCelula.value;
        const membroId = campoMembro.value;
        const status = campoStatus.value;

        if (!data) {
          campoMensagem.textContent = 'Selecione a data da reunião.';
          campoMensagem.style.color = '#dc2626';
          return;
        }

        if (!celula) {
          campoMensagem.textContent = 'Selecione a célula.';
          campoMensagem.style.color = '#dc2626';
          return;
        }

        if (!membroId) {
          campoMensagem.textContent = 'Selecione o membro que deseja lançar.';
          campoMensagem.style.color = '#dc2626';
          return;
        }

        if (!status) {
          campoMensagem.textContent = 'Selecione o status do membro.';
          campoMensagem.style.color = '#dc2626';
          return;
        }

        const statusAtual = presencas[membroId] || '';

        if (tipo === 'salvar' && statusAtual) {
          campoMensagem.textContent = 'Este membro já possui presença lançada nesta data. Use "Alterar presença salva".';
          campoMensagem.style.color = '#dc2626';
          return;
        }

        if (tipo === 'atualizar' && !statusAtual) {
          campoMensagem.textContent = 'Ainda não existe presença salva para este membro nesta data.';
          campoMensagem.style.color = '#dc2626';
          return;
        }

        try {
          presencas[membroId] = status;

          const registros = Object.entries(presencas).map(([id, valor]) => ({
            membroId: Number(id),
            status: valor
          }));

          const resposta = await fetch(apiPresencas, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data, registros })
          });

          if (resposta.ok) {
            campoMensagem.textContent = tipo === 'salvar'
              ? 'Presença lançada com sucesso.'
              : 'Presença alterada com sucesso.';
            campoMensagem.style.color = '#16a34a';
            await carregarPresencasDaData();
            campoStatus.value = '';
            atualizarSituacaoAtual();
          } else {
            campoMensagem.textContent = 'Erro ao salvar presença.';
            campoMensagem.style.color = '#dc2626';
          }
        } catch (erro) {
          console.error(erro);
          campoMensagem.textContent = 'Erro ao conectar com o servidor.';
          campoMensagem.style.color = '#dc2626';
        }
      }

      async function marcarTodos(status) {
        const data = campoData.value;
        const celula = campoCelula.value;

        if (!data) {
          campoMensagem.textContent = 'Selecione a data da reunião.';
          campoMensagem.style.color = '#dc2626';
          return;
        }

        if (!celula) {
          campoMensagem.textContent = 'Selecione a célula primeiro.';
          campoMensagem.style.color = '#dc2626';
          return;
        }

        if (!Array.isArray(membrosFiltrados) || membrosFiltrados.length === 0) {
          campoMensagem.textContent = 'Não há membros nesta célula.';
          campoMensagem.style.color = '#dc2626';
          return;
        }

        membrosFiltrados.forEach((membro) => {
          presencas[membro.id] = status;
        });

        try {
          const registros = Object.entries(presencas).map(([id, valor]) => ({
            membroId: Number(id),
            status: valor
          }));

          const resposta = await fetch(apiPresencas, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data, registros })
          });

          if (resposta.ok) {
            campoMensagem.textContent = status === 'presente'
              ? 'Todos os membros da célula foram marcados como presentes.'
              : 'Todos os membros da célula foram marcados como ausentes.';
            campoMensagem.style.color = '#16a34a';
            await carregarPresencasDaData();
            atualizarSituacaoAtual();
          } else {
            campoMensagem.textContent = 'Erro ao salvar presença em lote.';
            campoMensagem.style.color = '#dc2626';
          }
        } catch (erro) {
          console.error(erro);
          campoMensagem.textContent = 'Erro ao conectar com o servidor.';
          campoMensagem.style.color = '#dc2626';
        }
      }

      campoLista.addEventListener('click', (event) => {
        const botao = event.target.closest('[data-editar]');
        if (!botao) return;

        const membroId = botao.getAttribute('data-editar');
        const membro = membrosFiltrados.find((item) => String(item.id) === String(membroId));
        if (!membro) return;

        campoCelula.value = String(membro.celula || '').trim().toUpperCase();
        aplicarFiltroCelula();
        campoMembro.value = membroId;
        const statusAtual = presencas[membroId] || '';
        campoStatus.value = statusAtual || '';
        atualizarSituacaoAtual();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      campoCelula.addEventListener('change', aplicarFiltroCelula);

      campoMembro.addEventListener('change', () => {
        const membroId = campoMembro.value;
        const statusAtual = presencas[membroId] || '';
        campoStatus.value = statusAtual || '';
        atualizarSituacaoAtual();
      });

      campoData.addEventListener('change', carregarPresencasDaData);
      document.getElementById('btnSalvar').addEventListener('click', () => salvarOuAtualizarPresenca('salvar'));
      document.getElementById('btnAtualizar').addEventListener('click', () => salvarOuAtualizarPresenca('atualizar'));
      document.getElementById('btnPresenteTodos').addEventListener('click', () => marcarTodos('presente'));
      document.getElementById('btnAusenteTodos').addEventListener('click', () => marcarTodos('ausente'));
      document.getElementById('btnLimpar').addEventListener('click', () => limparSelecao(true));
      document.getElementById('btnSair').addEventListener('click', sair);

      verificarPermissao('presenca');
      aplicarPermissoesMenu();
      definirDataHoje();
      carregarMembros();
    });
  </script>
</body>
</html>
