<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>+Células | Células</title>
  <style>
    * { box-sizing: border-box; }
    :root{
      --bg:#eef2f7;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#dbe3ee;
      --blue:#2563eb;
      --blue-dark:#1d4ed8;
      --green:#16a34a;
      --amber:#f59e0b;
      --red:#dc2626;
      --shadow:0 10px 25px rgba(0,0,0,0.05);
      --radius:16px;
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .layout{display:flex;min-height:100vh;}
    .sidebar{
      width:250px;
      background:linear-gradient(180deg,var(--blue-dark),var(--green));
      color:#fff;
      padding:24px 18px;
      position:fixed;
      top:0;
      left:0;
      height:100%;
    }

    .logo{font-size:30px;font-weight:bold;margin:0;}
    .logo-sub{margin:6px 0 28px;font-size:13px;opacity:.9;}

    .menu a{
      display:block;
      color:#fff;
      padding:12px;
      text-decoration:none;
      border-radius:10px;
      margin-bottom:6px;
      font-weight:bold;
    }

    .menu a:hover,.menu a.ativo{
      background:rgba(255,255,255,.16);
    }

    .btn-sair{
      margin-top:20px;
      width:100%;
      padding:12px;
      border:none;
      border-radius:12px;
      background:var(--red);
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    .content{
      margin-left:250px;
      padding:30px;
      width:calc(100% - 250px);
    }

    .header,.card{
      background:var(--card);
      padding:22px;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .header{margin-bottom:20px;}
    .header h1{margin:0 0 8px;font-size:30px;}
    .header p{margin:0;color:var(--muted);}

    .grid{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:20px;
      align-items:start;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    label{
      display:block;
      margin-top:12px;
      margin-bottom:6px;
      font-weight:bold;
      font-size:14px;
    }

    input,select{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--line);
      font-size:15px;
      background:#fff;
    }

    .acoes-form{
      display:flex;
      gap:10px;
      margin-top:16px;
      flex-wrap:wrap;
    }

    button{
      padding:12px 14px;
      border-radius:10px;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }

    .btn-salvar{background:var(--blue);color:#fff;}
    .btn-limpar{background:var(--amber);color:#fff;}
    .btn-geo{background:var(--green);color:#fff;}
    .btn-novo{background:#64748b;color:#fff;}

    .lista-membro,
    .celula-item{
      border:1px solid var(--line);
      padding:14px;
      margin-bottom:10px;
      border-radius:12px;
      background:#fafbfd;
    }

    .celula-item{
      cursor:pointer;
      transition:.2s;
    }

    .celula-item:hover,
    .celula-item.ativa{
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(37,99,235,.10);
    }

    .vazio{
      color:var(--muted);
      text-align:center;
      padding:20px;
      border:2px dashed var(--line);
      border-radius:12px;
      background:#fcfdff;
    }

    #msg{
      margin-top:14px;
      font-weight:bold;
      min-height:20px;
      font-size:14px;
    }

    @media(max-width:1100px){
      .grid{grid-template-columns:1fr;}
    }

    @media(max-width:900px){
      .layout{flex-direction:column;}
      .sidebar{position:relative;width:100%;height:auto;}
      .content{margin-left:0;width:100%;padding:20px;}
      .grid-2{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h2 class="logo">+Células</h2>
    <div class="logo-sub">Gestão de células</div>

    <div class="menu">
      <a href="painel.html">Painel</a>
      <a href="cadastro.html">Membros</a>
      <a href="presenca.html">Presença</a>
      <a href="celulas.html" class="ativo">Células</a>
      <a href="relatorios.html">Relatórios</a>
      <a href="usuarios.html">Usuários</a>
    </div>

    <button class="btn-sair" id="btnSair">Sair</button>
  </aside>

  <main class="content">
    <div class="header">
      <h1>Cadastro de células</h1>
      <p>Cadastre, consulte e edite células na mesma tela</p>
      <p id="usuarioLogado"></p>
    </div>

    <div class="grid">
      <div class="card">
        <h2 id="tituloForm">Nova célula</h2>
        <input id="celulaId" type="hidden">

        <label>Nome da célula</label>
        <input id="nomeCelula" type="text">

        <div class="grid-2">
          <div>
            <label>Dia da semana</label>
            <select id="diaSemana">
              <option value="">Selecione</option>
              <option>SEGUNDA-FEIRA</option>
              <option>TERÇA-FEIRA</option>
              <option>QUARTA-FEIRA</option>
              <option>QUINTA-FEIRA</option>
              <option>SEXTA-FEIRA</option>
              <option>SÁBADO</option>
              <option>DOMINGO</option>
            </select>
          </div>
          <div>
            <label>Hora</label>
            <input id="horaReuniao" type="time">
          </div>
        </div>

        <label>Anfitrião</label>
        <select id="anfitriao"></select>

        <div class="acoes-form">
          <button class="btn-salvar" id="btnSalvar">Salvar célula</button>
          <button class="btn-novo" id="btnNova">Nova célula</button>
        </div>

        <p id="msg"></p>
      </div>

      <div class="card">
        <h2>Células cadastradas</h2>
        <div id="listaCelulas"></div>
      </div>
    </div>
  </main>
</div>

<script>
const API = "https://celulas-backend.onrender.com";
let celulaSelecionada = "";

if(localStorage.getItem("logado") !== "sim"){
  window.location.href = "login.html";
}

document.getElementById("usuarioLogado").textContent =
  `Usuário: ${localStorage.getItem("nomeUsuario") || "Administrador"}`;

function sair(){
  localStorage.clear();
  window.location.href = "login.html";
}

document.getElementById("btnSair").onclick = sair;

async function carregarCelulas(){
  const lista = document.getElementById("listaCelulas");
  lista.innerHTML = '<div class="vazio">Carregando...</div>';

  try{
    const resp = await fetch(API + "/celulas",{cache:"no-store"});
    const dados = await resp.json();

    if(!dados.length){
      lista.innerHTML = '<div class="vazio">Nenhuma célula cadastrada.</div>';
      return;
    }

    lista.innerHTML = dados.map(c => `
      <div class="celula-item ${celulaSelecionada == c.id ? "ativa" : ""}" onclick="selecionarCelula(${c.id})">
        <strong>${c.nome}</strong><br>
        ${c.dia_semana || "-"} - ${c.hora || "-"}
      </div>
    `).join("");

  }catch{
    lista.innerHTML = '<div class="vazio">Erro ao carregar células.</div>';
  }
}

async function selecionarCelula(id){
  try{
    celulaSelecionada = id;

    const resp = await fetch(API + "/celulas/" + id,{cache:"no-store"});
    const c = await resp.json();

    document.getElementById("celulaId").value = c.id || "";
    document.getElementById("nomeCelula").value = (c.nome || "").replace("CÉLULA ","");
    document.getElementById("diaSemana").value = c.dia_semana || "";
    document.getElementById("horaReuniao").value = c.hora || "";
    document.getElementById("anfitriao").value = c.anfitriao || "";
    document.getElementById("tituloForm").textContent = "Editar célula";

    carregarCelulas();

  }catch{
    document.getElementById("msg").textContent = "Erro ao carregar célula.";
  }
}

document.getElementById("btnNova").onclick = function(){
  document.getElementById("celulaId").value = "";
  document.getElementById("nomeCelula").value = "";
  document.getElementById("diaSemana").value = "";
  document.getElementById("horaReuniao").value = "";
  document.getElementById("tituloForm").textContent = "Nova célula";
};

document.getElementById("btnSalvar").onclick = async function(){
  const id = document.getElementById("celulaId").value;
  const msg = document.getElementById("msg");

  const dados = {
    nomeCelula: document.getElementById("nomeCelula").value,
    diaSemana: document.getElementById("diaSemana").value,
    horaReuniao: document.getElementById("horaReuniao").value,
    anfitriao: document.getElementById("anfitriao").value
  };

  try{
    const resp = await fetch(API + (id ? "/celulas/" + id : "/celulas"),{
      method:id ? "PUT" : "POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(dados)
    });

    if(!resp.ok){
      msg.textContent = "Erro ao salvar.";
      return;
    }

    msg.textContent = "Célula salva com sucesso!";
    celulaSelecionada = "";
    carregarCelulas();

  }catch{
    msg.textContent = "Erro no servidor.";
  }
};

carregarCelulas();
</script>
</body>
</html>
